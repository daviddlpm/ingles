<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#2B2350">
<title>La Aventura de la Estrella Mágica ⭐</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#2B2350; --ink-soft:#6C6494;
    --sun:#FFC93C; --coral:#FF7B54; --mint:#3EC9A7; --berry:#B067E8; --sea:#3FA7F5;
    --shadow:0 6px 0 rgba(43,35,80,.18);
    --radius:26px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Nunito',system-ui,sans-serif; color:var(--ink);
    min-height:100vh; overflow-x:hidden;
    background:linear-gradient(180deg,#1E1840,#4A3D8F 55%,#8E7CF0);
    transition:background 1.2s;
  }
  h1,h2,h3{font-family:'Fredoka','Comic Sans MS',sans-serif;}

  header{
    position:sticky; top:0; z-index:50;
    display:flex; align-items:center; gap:8px; padding:10px 12px;
    background:rgba(255,255,255,.82); backdrop-filter:blur(10px);
    border-bottom:3px solid rgba(43,35,80,.08);
  }
  header .title{font-family:'Fredoka'; font-weight:700; font-size:1.02rem; flex:1;}
  .gem-badge{
    background:linear-gradient(120deg,#BDEBFF,#7FE3FF); border-radius:999px; padding:6px 12px;
    font-weight:800; font-size:.95rem; box-shadow:0 3px 0 rgba(30,110,150,.3), inset 0 0 10px rgba(255,255,255,.7);
    white-space:nowrap;
  }
  .icon-btn{background:#fff; border:3px solid rgba(43,35,80,.12); border-radius:16px; font-size:1.15rem; padding:6px 9px; cursor:pointer; box-shadow:var(--shadow);}
  .icon-btn:active{transform:translateY(3px); box-shadow:none;}

  main{max-width:680px; margin:0 auto; padding:16px 14px 90px; position:relative; z-index:1;}
  .screen{animation:screenIn .45s ease both;}
  @keyframes screenIn{from{opacity:0; transform:translateY(16px);}to{opacity:1; transform:none;}}

  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    font-family:'Fredoka'; font-weight:600; font-size:1.12rem;
    border:none; border-radius:var(--radius); padding:14px 26px;
    cursor:pointer; color:#fff; background:var(--sea);
    box-shadow:0 5px 0 rgba(0,0,0,.22); transition:transform .08s;
  }
  .btn:active{transform:translateY(4px); box-shadow:0 1px 0 rgba(0,0,0,.22);}
  .btn.sun{background:linear-gradient(180deg,#FFD968,#FFB82E); color:#6B4A00;}
  .btn.coral{background:linear-gradient(180deg,#FF9270,#FF6238);}
  .btn.mint{background:linear-gradient(180deg,#5BDDBB,#27B591);}
  .btn.berry{background:linear-gradient(180deg,#C284F0,#9A4DDB);}
  .btn.ghost{background:rgba(255,255,255,.92); color:var(--ink); border:3px solid rgba(43,35,80,.14); box-shadow:var(--shadow);}
  .btn.big{font-size:1.35rem; padding:18px 32px; border-radius:32px;}
  .btn:focus-visible,.icon-btn:focus-visible,.opt:focus-visible{outline:4px solid #FF8A3D; outline-offset:3px;}

  /* ===== paneles ===== */
  .glass{
    background:rgba(255,255,255,.93); backdrop-filter:blur(8px);
    border-radius:32px; padding:24px 20px; text-align:center;
    box-shadow:0 12px 30px rgba(20,12,60,.35), 0 8px 0 rgba(43,35,80,.15);
  }
  .glass p{font-weight:700; color:var(--ink-soft); font-size:1.02rem; line-height:1.5;}

  /* ===== intro ===== */
  .intro-sky{position:relative; overflow:hidden; border-radius:36px; margin-bottom:-70px; height:220px;
    background:linear-gradient(180deg,#141031,#3A2E7A 70%,#6B5CC9);}
  .intro-sky svg{position:absolute; inset:0; width:100%; height:100%;}
  .big-star{
    position:absolute; left:50%; top:44%; transform:translate(-50%,-50%);
    font-size:4.6rem; filter:drop-shadow(0 0 22px #FFE28A) drop-shadow(0 0 60px #FFC93C);
    animation:starFloat 3.5s ease-in-out infinite;
  }
  @keyframes starFloat{50%{transform:translate(-50%,-58%) rotate(8deg);}}
  .heroes{display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin:16px 0;}
  .hero-pick{
    font-size:2.6rem; padding:16px 6px; border-radius:22px; cursor:pointer;
    background:#F6F3FF; border:4px solid rgba(43,35,80,.1); transition:transform .12s;
  }
  .hero-pick.sel{border-color:var(--sun); background:#FFF3D6; transform:scale(1.12) rotate(-3deg);
    box-shadow:0 0 0 6px rgba(255,201,60,.25);}

  /* ===== mapa de reinos ===== */
  .realm-card{
    width:100%; border:none; cursor:pointer; position:relative;
    border-radius:28px; margin-bottom:16px; padding:0; overflow:hidden;
    box-shadow:0 12px 26px rgba(15,10,50,.45), 0 6px 0 rgba(0,0,0,.25);
    height:118px; text-align:left; font-family:'Nunito'; color:#fff;
    transition:transform .12s;
  }
  .realm-card:active{transform:scale(.97);}
  .realm-card .scene-bg{position:absolute; inset:0;}
  .realm-card .scene-bg svg{width:100%; height:100%; display:block;}
  .realm-card .veil{position:absolute; inset:0; background:linear-gradient(90deg, rgba(10,5,40,.62) 0%, rgba(10,5,40,.28) 55%, rgba(10,5,40,0) 100%);}
  .realm-card .content{position:relative; z-index:2; display:flex; align-items:center; gap:14px; height:100%; padding:0 16px;}
  .realm-card .re{font-size:2.5rem; filter:drop-shadow(0 3px 4px rgba(0,0,0,.4));}
  .realm-card .ri{flex:1;}
  .realm-card .rn{font-family:'Fredoka'; font-weight:700; font-size:1.25rem; text-shadow:0 2px 4px rgba(0,0,0,.55); display:block;}
  .realm-card .rd{font-weight:700; font-size:.86rem; text-shadow:0 1px 3px rgba(0,0,0,.6); opacity:.95;}
  .realm-card .artifact{font-size:1.9rem; filter:drop-shadow(0 0 8px #FFE28A);}
  .realm-card.locked .scene-bg{filter:grayscale(.9) brightness(.6);}
  .realm-card.locked .re{filter:grayscale(1);}
  .gems-strip{
    display:flex; justify-content:center; gap:10px; font-size:1.6rem; margin:8px 0 2px;
  }
  .gems-strip span{filter:drop-shadow(0 0 8px rgba(255,226,138,.9));}
  .gems-strip .off{filter:grayscale(1); opacity:.45;}

  /* ===== camino del reino ===== */
  .trail-wrap{position:relative; border-radius:32px; overflow:hidden; margin-top:10px;
    box-shadow:0 16px 36px rgba(10,5,40,.5), inset 0 0 0 4px rgba(255,255,255,.25); height:560px;}
  .trail-scene{position:absolute; inset:0;}
  .trail-scene svg{width:100%; height:100%; display:block;}
  .trail-fx{position:absolute; inset:0; pointer-events:none;}
  .trail-road{position:absolute; inset:0; pointer-events:none;}
  .trail-stop{
    position:absolute; transform:translate(-50%,-50%);
    width:62px; height:62px; border-radius:50%;
    border:4px solid #fff; cursor:pointer; font-size:1.65rem;
    display:flex; align-items:center; justify-content:center;
    background:radial-gradient(circle at 35% 30%, #FFFDF4, #F3E8CF);
    box-shadow:0 6px 12px rgba(20,10,50,.4), 0 3px 0 rgba(120,90,40,.5);
    z-index:4;
  }
  .trail-stop.done{background:radial-gradient(circle at 35% 30%, #E7FFF3, #B7EDD3); border-color:#7FDCB4;}
  .trail-stop.locked{filter:grayscale(1) brightness(.85); cursor:default; opacity:.75;}
  .trail-stop.next{animation:glow 1.4s infinite;}
  @keyframes glow{50%{box-shadow:0 0 0 14px rgba(255,220,90,.4), 0 6px 12px rgba(20,10,50,.4);}}
  .hero-token{
    position:absolute; transform:translate(-50%,-115%); font-size:2.5rem; z-index:6;
    transition:top 1.3s cubic-bezier(.5,0,.5,1), left 1.3s cubic-bezier(.5,0,.5,1);
    pointer-events:none; filter:drop-shadow(0 5px 4px rgba(0,0,0,.35));
    animation:hbob 1.5s ease-in-out infinite;
  }
  .hero-token.walking{animation:walkHop .35s ease-in-out infinite;}
  @keyframes hbob{50%{margin-top:-6px;}}
  @keyframes walkHop{50%{margin-top:-14px; transform:translate(-50%,-115%) rotate(6deg);}}
  .realm-title{
    text-align:center; color:#fff; margin:4px 0;
    text-shadow:0 2px 6px rgba(0,0,0,.5); letter-spacing:.5px;
  }

  /* ===== escena de fondo en retos ===== */
  .stage{
    background:rgba(255,255,255,.94); backdrop-filter:blur(6px);
    border-radius:32px; overflow:hidden;
    box-shadow:0 14px 32px rgba(10,5,40,.45); text-align:center;
  }
  .stage-banner{height:88px; position:relative; overflow:hidden;}
  .stage-banner svg{width:100%; height:220px; display:block;}
  .stage-banner .npc-on{position:absolute; bottom:6px; left:50%; transform:translateX(-50%); font-size:2.6rem; filter:drop-shadow(0 3px 4px rgba(0,0,0,.4));}
  .stage-body{padding:18px 16px 22px;}
  .progress-dots{display:flex; gap:6px; justify-content:center; margin-bottom:12px; flex-wrap:wrap;}
  .dot{width:11px; height:11px; border-radius:50%; background:rgba(43,35,80,.15);}
  .dot.on{background:var(--mint);}
  .dot.now{background:var(--sun); transform:scale(1.3);}
  .word-emoji{font-size:4.4rem; line-height:1.1; margin:6px 0; filter:drop-shadow(0 4px 6px rgba(43,35,80,.25));}
  .word-emoji.long{font-size:2.8rem;}
  .word-en{font-family:'Fredoka'; font-weight:700; font-size:2rem; margin:2px 0;}
  .word-en.phrase{font-size:1.4rem;}
  .word-es{color:var(--ink-soft); font-weight:700; font-size:1.02rem; margin-bottom:8px;}
  .controls{display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-top:14px;}
  .hint{color:var(--ink-soft); font-weight:700; font-size:.92rem; margin-top:10px;}

  .opts{display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-top:14px;}
  .opt{
    background:linear-gradient(180deg,#FDFEFF,#EFF4FF);
    border:4px solid rgba(43,35,80,.1); border-radius:24px;
    font-size:2.9rem; padding:16px 6px; cursor:pointer; transition:transform .08s;
    box-shadow:0 4px 0 rgba(43,35,80,.12);
  }
  .opt.long{font-size:1.8rem;}
  .opt.txt{font-family:'Fredoka'; font-weight:600; font-size:1.2rem; color:var(--ink);}
  .opt:active{transform:scale(.95);}
  .opt.good{background:linear-gradient(180deg,#E9FFF4,#C9F5DF); border-color:var(--mint); animation:pop .4s;}
  .opt.bad{background:linear-gradient(180deg,#FFEDEA,#FFD9D3); border-color:var(--coral); animation:shake .4s;}
  @keyframes pop{50%{transform:scale(1.12);}}
  @keyframes shake{25%{transform:translateX(-8px);}75%{transform:translateX(8px);}}

  .match-cols{display:flex; gap:14px; margin-top:14px;}
  .match-col{flex:1; display:flex; flex-direction:column; gap:10px;}
  .match-item{border:3px solid rgba(43,35,80,.12); border-radius:16px; background:linear-gradient(180deg,#FDFEFF,#EFF4FF); padding:12px 8px; cursor:pointer; font-weight:700; color:var(--ink); box-shadow:0 3px 0 rgba(43,35,80,.1);}
  .match-item.word{font-family:'Fredoka'; font-size:1rem;}
  .match-item.img{font-size:1.9rem;}
  .match-item.sel{border-color:var(--sun); background:#FFF3D6; transform:scale(1.04);}
  .match-item.done{background:#DDF7E9; border-color:var(--mint); opacity:.7; cursor:default;}
  .match-item.bad{border-color:var(--coral); background:#FFE3E0; animation:shake .4s;}

  .scene{position:relative; border-radius:24px; margin-top:12px; overflow:hidden; box-shadow:inset 0 0 0 3px rgba(43,35,80,.08);}
  .scene > svg{position:absolute; inset:0; width:100%; height:100%;}
  .scene-item{position:absolute; width:56px; height:56px; border-radius:50%; transform:translate(-50%,-50%); background:rgba(255,255,255,.96); border:none; cursor:pointer; font-size:1.85rem; display:flex; align-items:center; justify-content:center; box-shadow:0 5px 10px rgba(20,10,50,.35); z-index:2;}
  .scene-item.found{background:#DDF7E9; border:3px solid var(--mint); font-size:1.45rem;}
  .scene-item:disabled{cursor:default;}
  .scene-item.wrong-shake{animation:shake .4s;}

  .mgrid{display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-top:10px;}
  .mcard{aspect-ratio:3/3.5; border-radius:18px; border:none; cursor:pointer;
    background:linear-gradient(160deg,#A87BE8,#7A4DC9); color:#fff; font-size:1.9rem;
    display:flex; align-items:center; justify-content:center; font-family:'Fredoka'; font-weight:600;
    box-shadow:0 5px 0 rgba(60,30,110,.5); transition:transform .15s;}
  .mcard.flip{background:#fff; color:var(--ink); border:4px solid rgba(43,35,80,.12); box-shadow:var(--shadow);}
  .mcard.done{background:#DDF7E9; border:4px solid var(--mint); color:var(--ink); cursor:default;}
  .mcard .wtxt{font-size:.95rem; padding:4px; word-break:break-word;}

  .slots{display:flex; gap:6px; justify-content:center; flex-wrap:wrap; margin:14px 0; min-height:52px;}
  .slot{width:42px; height:50px; border-radius:12px; background:#F6F9FF; border:3px dashed rgba(43,35,80,.25); font-family:'Fredoka'; font-weight:700; font-size:1.5rem; display:flex; align-items:center; justify-content:center;}
  .slot.filled{border-style:solid; border-color:var(--sea); background:#fff;}
  .tiles{display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin-top:6px;}
  .tile{min-width:46px; padding:10px 12px; border-radius:14px; border:none; cursor:pointer; background:linear-gradient(180deg,#FFD968,#FFB82E); color:#6B4A00; font-family:'Fredoka'; font-weight:700; font-size:1.35rem; box-shadow:0 4px 0 rgba(180,120,0,.4);}
  .tile.word{font-size:1.1rem; background:linear-gradient(180deg,#C284F0,#9A4DDB); color:#fff; box-shadow:0 4px 0 rgba(80,30,140,.5);}
  .tile:disabled{opacity:.25; box-shadow:none; transform:translateY(3px);}
  .tile:active{transform:translateY(3px); box-shadow:none;}
  .answer-row{min-height:54px; background:#F6F9FF; border-radius:18px; border:3px dashed rgba(43,35,80,.2); display:flex; gap:8px; flex-wrap:wrap; justify-content:center; align-items:center; padding:8px; margin:12px 0;}
  .answer-row .tile.word{background:linear-gradient(180deg,#6FBBF7,#2E8FE0);}
  .answer-row.good{border-color:var(--mint); background:#DDF7E9;}
  .answer-row.bad{border-color:var(--coral); background:#FFE3E0; animation:shake .4s;}

  .mic-btn{width:100px; height:100px; border-radius:50%; border:none; cursor:pointer;
    background:radial-gradient(circle at 35% 30%, #FF9A76, #F0552C);
    color:#fff; font-size:2.7rem; margin-top:6px;
    box-shadow:0 8px 0 rgba(140,40,10,.5), 0 12px 24px rgba(240,85,44,.4);}
  .mic-btn:active{transform:translateY(4px); box-shadow:0 3px 0 rgba(140,40,10,.5);}
  .mic-btn.listening{animation:pulse 1s infinite; background:radial-gradient(circle at 35% 30%, #7DE0C6, #1FA383);}
  @keyframes pulse{50%{transform:scale(1.08); box-shadow:0 0 0 18px rgba(62,201,167,.2);}}
  .feedback{min-height:2.1rem; font-family:'Fredoka'; font-weight:600; font-size:1.15rem; margin-top:12px;}
  .feedback.ok{color:#1FA383;}
  .feedback.no{color:#F0552C;}
  .heard{color:var(--ink-soft); font-weight:700; font-size:.9rem; min-height:1.2rem;}

  /* ===== batalla contra el guardián ===== */
  .battle-head{
    display:flex; align-items:center; justify-content:space-around; gap:8px;
    padding:6px 8px 12px;
  }
  .fighter{text-align:center;}
  .fighter .av{font-size:3rem; display:inline-block; filter:drop-shadow(0 4px 6px rgba(0,0,0,.35));}
  .fighter .nm{font-family:'Fredoka'; font-weight:600; font-size:.85rem; color:var(--ink-soft);}
  .fighter.boss .av.hit{animation:bossHit .5s;}
  @keyframes bossHit{20%{transform:translateX(-10px) rotate(-8deg); filter:brightness(2) drop-shadow(0 0 12px #FFE28A);}60%{transform:translateX(8px) rotate(5deg);}}
  .vs{font-family:'Fredoka'; font-weight:700; font-size:1.4rem; color:var(--coral); text-shadow:0 2px 0 rgba(0,0,0,.1);}
  .shields{display:flex; gap:6px; justify-content:center; font-size:1.5rem; min-height:2rem;}
  .shields .sh{transition:transform .3s, opacity .3s; display:inline-block;}
  .shields .sh.broken{transform:scale(1.6) rotate(30deg); opacity:0;}

  /* ===== recompensa ===== */
  .overlay{position:fixed; inset:0; background:rgba(20,12,55,.62); backdrop-filter:blur(3px); z-index:100; display:flex; align-items:center; justify-content:center; padding:20px;}
  .reward{background:#fff; border-radius:36px; padding:28px 24px; text-align:center; max-width:390px; width:100%;
    box-shadow:0 20px 50px rgba(0,0,0,.45); animation:rewardIn .45s cubic-bezier(.34,1.56,.64,1) both; max-height:90vh; overflow:auto; position:relative;}
  @keyframes rewardIn{from{opacity:0; transform:scale(.6);}to{opacity:1; transform:scale(1);}}
  .reward h2{margin:4px 0 8px; font-size:1.6rem;}
  .burst{
    position:absolute; top:14px; left:50%; transform:translateX(-50%);
    width:150px; height:150px; pointer-events:none; z-index:0;
    background:conic-gradient(from 0deg, rgba(255,220,90,.35) 0 12deg, transparent 12deg 30deg,
      rgba(255,220,90,.35) 30deg 42deg, transparent 42deg 60deg, rgba(255,220,90,.35) 60deg 72deg,
      transparent 72deg 90deg, rgba(255,220,90,.35) 90deg 102deg, transparent 102deg 120deg,
      rgba(255,220,90,.35) 120deg 132deg, transparent 132deg 150deg, rgba(255,220,90,.35) 150deg 162deg,
      transparent 162deg 180deg, rgba(255,220,90,.35) 180deg 192deg, transparent 192deg 210deg,
      rgba(255,220,90,.35) 210deg 222deg, transparent 222deg 240deg, rgba(255,220,90,.35) 240deg 252deg,
      transparent 252deg 270deg, rgba(255,220,90,.35) 270deg 282deg, transparent 282deg 300deg,
      rgba(255,220,90,.35) 300deg 312deg, transparent 312deg 330deg, rgba(255,220,90,.35) 330deg 342deg, transparent 342deg 360deg);
    border-radius:50%; animation:spin 8s linear infinite;
  }
  @keyframes spin{to{transform:translateX(-50%) rotate(360deg);}}
  .reward > *{position:relative; z-index:1;}
  .rgems{font-size:2.4rem; letter-spacing:6px; margin:8px 0;}
  .rgems .g{opacity:.2; display:inline-block;}
  .rgems .g.fill{opacity:1; animation:gempop .45s both; filter:drop-shadow(0 0 8px #7FE3FF);}
  @keyframes gempop{0%{transform:scale(0) rotate(-40deg);}70%{transform:scale(1.4);}100%{transform:scale(1);}}
  .reward p{color:var(--ink-soft); font-weight:700; margin:6px 0 14px;}

  .confetti{position:fixed; top:-20px; width:12px; height:12px; z-index:200; border-radius:3px; pointer-events:none; animation:fall linear forwards;}
  @keyframes fall{to{transform:translateY(110vh) rotate(720deg);}}

  .panel{background:#fff; border-radius:28px; padding:22px; max-width:400px; width:100%; box-shadow:0 20px 50px rgba(0,0,0,.4); max-height:88vh; overflow:auto;}
  .panel .btn{width:100%; margin-top:10px;}
  .panel p{color:var(--ink-soft); font-weight:600; font-size:.95rem;}

  .back-row{display:flex; justify-content:flex-start; margin-bottom:10px; gap:8px;}

  /* animaciones de las escenas SVG */
  .sway{transform-origin:bottom center; animation:swayA 5s ease-in-out infinite;}
  @keyframes swayA{50%{transform:rotate(2.4deg);}}
  .twinkle{animation:twk 2.6s ease-in-out infinite;}
  @keyframes twk{50%{opacity:.15;}}
  .floaty{animation:fltA 7s ease-in-out infinite;}
  @keyframes fltA{50%{transform:translateY(-10px);}}
  .wavemove{animation:wvm 7s linear infinite;}
  @keyframes wvm{to{transform:translateX(-200px);}}
  .aurora{animation:aur 6s ease-in-out infinite;}
  @keyframes aur{50%{opacity:.25;}}
  .flicker{animation:flk 1.8s ease-in-out infinite;}
  @keyframes flk{50%{opacity:.45;}}

  @media (max-width:420px){
    .word-emoji{font-size:3.7rem;}
    .opt{font-size:2.4rem; padding:14px 6px;}
    .slot{width:34px; height:44px; font-size:1.25rem;}
    .trail-wrap{height:520px;}
  }
  @media (prefers-reduced-motion:reduce){ *{animation:none !important; transition:none !important;} }
</style>
</head>
<body>

<header>
  <button class="icon-btn" id="homeBtn" aria-label="Mapa de reinos">🗺️</button>
  <div class="title">La Estrella Mágica</div>
  <div class="gem-badge" id="gemBadge">💎 0</div>
  <a class="icon-btn" href="index.html" aria-label="Elegir juego" style="text-decoration:none">🎮</a>
  <button class="icon-btn" id="parentBtn" aria-label="Zona de padres">⚙️</button>
</header>

<main id="app"></main>

<script>
"use strict";

/* ============================================================
   ESCENARIOS ILUSTRADOS (SVG por capas, sin imágenes externas)
   ============================================================ */
function svgTree(x,y,s,c1,c2){
  return `<g class="sway" style="animation-delay:${(x%5)*0.4}s">
    <rect x="${x-3*s}" y="${y-14*s}" width="${6*s}" height="${16*s}" rx="${2*s}" fill="#7A5230"/>
    <ellipse cx="${x}" cy="${y-26*s}" rx="${16*s}" ry="${14*s}" fill="${c1}"/>
    <ellipse cx="${x-9*s}" cy="${y-18*s}" rx="${11*s}" ry="${9*s}" fill="${c2}"/>
    <ellipse cx="${x+10*s}" cy="${y-19*s}" rx="${10*s}" ry="${9*s}" fill="${c2}"/>

/* ============================================================
   PARTÍCULAS (canvas): nieve, luciérnagas, burbujas, estrellas, ascuas
   ============================================================ */
let fxRAF = null, fxCanvas = null;
function stopFX(){ if(fxRAF){ cancelAnimationFrame(fxRAF); fxRAF = null; } fxCanvas = null; }
function startFX(canvas, type){
  stopFX();
  if(!canvas || !canvas.getContext) return;
  const ctx = canvas.getContext('2d');
  if(!ctx) return;
  fxCanvas = canvas;
  const W = canvas.width = canvas.offsetWidth || 400;
  const H = canvas.height = canvas.offsetHeight || 560;
  const N = type==='snow' ? 46 : 26;
  const ps = [];
  for(let i=0;i<N;i++){
    ps.push({x:Math.random()*W, y:Math.random()*H, r:1+Math.random()*2.5,
      vx:(Math.random()-.5)*0.4, vy:0.3+Math.random()*0.8, ph:Math.random()*6.28});
  }
  function frame(){
    if(fxCanvas !== canvas){ return; }
    ctx.clearRect(0,0,W,H);
    for(const p of ps){
      p.ph += 0.03;
      if(type==='snow'){
        p.x += p.vx + Math.sin(p.ph)*0.3; p.y += p.vy;
        if(p.y > H){ p.y = -4; p.x = Math.random()*W; }
        ctx.globalAlpha = .85;
        ctx.fillStyle = '#FFFFFF';
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, 6.28); ctx.fill();
      }else if(type==='fireflies'){
        p.x += Math.sin(p.ph)*0.5; p.y += Math.cos(p.ph*0.7)*0.4;
        if(p.x<0)p.x=W; if(p.x>W)p.x=0; if(p.y<0)p.y=H; if(p.y>H)p.y=0;
        const a = 0.35 + Math.abs(Math.sin(p.ph*1.6))*0.6;
        ctx.globalAlpha = a;
        ctx.fillStyle = '#FFF3A0';
        ctx.shadowColor = '#FFF3A0'; ctx.shadowBlur = 8;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r*0.9, 0, 6.28); ctx.fill();
        ctx.shadowBlur = 0;
      }else if(type==='bubbles'){
        p.y -= p.vy*0.8; p.x += Math.sin(p.ph)*0.4;
        if(p.y < -4){ p.y = H+4; p.x = Math.random()*W; }
        ctx.globalAlpha = .4;
        ctx.strokeStyle = '#FFFFFF'; ctx.lineWidth = 1.2;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r+1, 0, 6.28); ctx.stroke();
      }else if(type==='stars'){
        const a = 0.25 + Math.abs(Math.sin(p.ph*1.2))*0.7;
        ctx.globalAlpha = a;
        ctx.fillStyle = '#FFF6D8';
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r*0.8, 0, 6.28); ctx.fill();
      }else if(type==='embers'){
        p.y -= p.vy*0.6; p.x += Math.sin(p.ph)*0.3;
        if(p.y < -4){ p.y = H+4; p.x = Math.random()*W; }
        const a = 0.3 + Math.abs(Math.sin(p.ph*2))*0.5;
        ctx.globalAlpha = a;
        ctx.fillStyle = '#C9A7F5';
        ctx.shadowColor = '#C9A7F5'; ctx.shadowBlur = 6;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r*0.8, 0, 6.28); ctx.fill();
        ctx.shadowBlur = 0;
      }
    }
    ctx.globalAlpha = 1;
    fxRAF = requestAnimationFrame(frame);
  }
  frame();
}

let audioCtx = null;
function tone(seq){
  try{
    if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    let t = audioCtx.currentTime;
    seq.forEach(([f,d])=>{
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.type = 'triangle'; o.frequency.value = f;
      g.gain.setValueAtTime(.18, t); g.gain.exponentialRampToValueAtTime(.001, t+d);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(t); o.stop(t+d); t += d*0.9;
    });
  }catch(e){}
}

let enVoice = null;
function pickVoice(){
  const vs = speechSynthesis.getVoices();
  if(!vs.length) return;
  enVoice = vs.find(v=>/en[-_](GB|US)/i.test(v.lang) && /google/i.test(v.name))
         || vs.find(v=>/^en[-_]/i.test(v.lang)) || null;
}
if('speechSynthesis' in window){ pickVoice(); speechSynthesis.onvoiceschanged = pickVoice; }
function speak(text, rate){
  if(!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US'; u.rate = rate || 0.85; u.pitch = 1.05;
  if(enVoice) u.voice = enVoice;
  speechSynthesis.speak(u);
}

const DIGIT_MAP = {one:'1',two:'2',three:'3',four:'4',five:'5',six:'6',seven:'7',eight:'8',nine:'9',ten:'10'};
const HOMOPHONES = {red:['read'],one:['won'],two:['to','too'],blue:['blew'],sea:['see','si','c'],bee:['be','b'],bear:['bare'],ice:['eyes'],three:['tree','free']};
function normalize(s){
  return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9 ]/g,' ').replace(/\s+/g,' ').trim();
}
function lev(a,b){
  const m=a.length,n=b.length; if(!m) return n; if(!n) return m;
  const d=Array.from({length:m+1},(_,i)=>[i,...Array(n).fill(0)]);
  for(let j=1;j<=n;j++) d[0][j]=j;
  for(let i=1;i<=m;i++) for(let j=1;j<=n;j++)
    d[i][j]=Math.min(d[i-1][j]+1,d[i][j-1]+1,d[i-1][j-1]+(a[i-1]===b[j-1]?0:1));
  return d[m][n];
}
function matchesAnswer(transcript, target){
  const t = normalize(transcript);
  const tgt = normalize(target);
  if(!t) return false;
  if(t === tgt || t.includes(tgt)) return true;
  const tgtWords = tgt.split(' ');
  const tWords = t.split(' ');
  if(tgtWords.length === 1){
    if(DIGIT_MAP[tgt] && tWords.includes(DIGIT_MAP[tgt])) return true;
    if(HOMOPHONES[tgt] && tWords.some(w=>HOMOPHONES[tgt].includes(w))) return true;
    const tol = tgt.length >= 5 ? 2 : (tgt.length >= 4 ? 1 : 0);
    return tWords.some(w => lev(w, tgt) <= tol);
  }
  if(lev(t, tgt) <= Math.max(2, Math.floor(tgt.length * 0.28))) return true;
  const stop = new Set(['a','an','the','to','is','it','i']);
  const key = tgtWords.filter(w=>!stop.has(w));
  const hits = key.filter(w => tWords.some(x => lev(x,w) <= (w.length>=5?2:1))).length;
  return key.length > 0 && hits / key.length >= 0.6;
}

function sceneSlots(n){
  const cols = n <= 6 ? 3 : 4;
  const rows = Math.ceil(n/cols);
  const cellW = 100/cols, cellH = 100/rows;
  const idxs = shuffle([...Array(cols*rows).keys()]).slice(0, n);
  return idxs.map(i=>{
    const r = Math.floor(i/cols), c = i%cols;
    return { top: r*cellH + cellH/2 + (Math.random()-0.5)*cellH*0.4,
             left: c*cellW + cellW/2 + (Math.random()-0.5)*cellW*0.4, rows };
  });
}

const TRAIL_POS = [

function roadPath(){
  // curva suave que pasa por todas las paradas (coordenadas 0-100)
  const pts = TRAIL_POS.map(p=>({x:p.left, y:p.top}));
  let d = `M ${pts[0].x} ${pts[0].y}`;
  for(let i=1;i<pts.length;i++){
    const prev = pts[i-1], cur = pts[i];
    const mx = (prev.x+cur.x)/2, my = (prev.y+cur.y)/2;
    d += ` Q ${prev.x} ${prev.y} ${mx} ${my}`;
  }
  const last = pts[pts.length-1];
  d += ` T ${last.x} ${last.y}`;
  return d;
}

  const isBoss = plots[si].game === 'boss';

  if(isNew){

    saveState();

  updateBadge();
  const ov = document.createElement('div');
  ov.className = 'overlay';
  let gemHtml = '';
  for(let i=0;i<3;i++) gemHtml += `<span class="g ${i<gems?'fill':''}" style="animation-delay:${0.3+i*0.35}s">💎</span>`;
  ov.innerHTML = `
    <div class="reward">
      <div class="burst"></div>
      <div style="font-size:3rem">${isBoss ? r.artifact : (gems>=3?'🎉':'😄')}</div>
      <h2>${isBoss ? '¡GEMA RECUPERADA!' : (gems>=3?'¡PERFECTO!':(gems>=2?'¡Muy bien!':'¡Buen intento!'))}</h2>
      <div class="rgems">${gemHtml}</div>
      <p>${msg}${isNew?'':' (reto repetido: sin gemas nuevas)'}</p>
      <button class="btn sun big" id="rwOk">¡Seguir! 🚀</button>
    </div>`;
  document.body.appendChild(ov);
  let i = 0;
  const tm = setInterval(()=>{ i++; if(i<=gems) sndGem(); else clearInterval(tm); }, 350);
  if(gems >= 3 || isBoss){ confetti(); if(isBoss) sndWin(); }
  ov.querySelector('#rwOk').onclick = ()=>{
    ov.remove();
    renderRealm(ri, (isBoss || !isNew) ? undefined : si);
    if(isBoss && artifacts().length === REALMS.length){ setTimeout(renderFinale, 1400); }
  };
}

function pickWords(r, n){ return shuffle(r.words).slice(0, Math.min(n, r.words.length)); }

function gameListen(ri, si, replay){
  const r = REALMS[ri];
  const rounds = pickWords(r, 5);
  let idx = 0, correct = 0, firstTry = true;
  const results = [];
  function draw(){
    const w = rounds[idx];
    const used = new Set([w.e]);
    const distract = shuffle(r.words).filter(x=>{
      if(x.en===w.en || used.has(x.e)) return false;
      used.add(x.e); return true;
    }).slice(0,3);
    const options = shuffle([w, ...distract]);
    firstTry = true;
    const body = gameShell(ri, `
      ${dots(idx, rounds.length, results)}
      <h2 style="margin:4px 0">👂 ¿Qué has oído?</h2>
      <button class="btn mint" id="replayBtn">🔊 Escuchar otra vez</button>
      <div class="opts">
        ${options.map(o=>`<button class="opt ${emojiLen(o.e)>2?'long':''}" data-en="${o.en.replace(/"/g,'')}" aria-label="${o.es}">${o.e}</button>`).join('')}
      </div>`, '🔮');
    const play = ()=>speak(w.en);
    setTimeout(play, 400);
    body.querySelector('#replayBtn').onclick = play;
    body.querySelectorAll('.opt').forEach(b=>{
      b.onclick = ()=>{
        if(b.dataset.en === w.en.replace(/"/g,'')){
          b.classList.add('good'); sndGood();
          if(firstTry) correct++;
          results[idx] = firstTry;
          speak(w.en, 0.9);
          setTimeout(()=>{
            idx++;
            if(idx < rounds.length) draw();
            else stopReward(ri, si, gemsFromScore(correct, rounds.length), `Has acertado ${correct} de ${rounds.length}`, replay);
          }, 900);
        }else{
          b.classList.add('bad'); sndBad(); firstTry = false;
          setTimeout(()=>b.classList.remove('bad'), 500);
        }
      };
    });
  }
  draw();
}

function gameMatch(ri, si, replay){
  const r = REALMS[ri];
  const items = pickWords(r, 5);
  const wordsCol = shuffle(items.map((w,i)=>({...w, i})));
  const imgsCol = shuffle(items.map((w,i)=>({...w, i})));
  let doneCount = 0, attempts = 0, pending = null;
  const body = gameShell(ri, `
    <h2 style="margin:4px 0">🔗 Une palabra y dibujo</h2>
    <div class="match-cols">
      <div class="match-col">${wordsCol.map(w=>`<button class="match-item word" data-i="${w.i}">${w.en.toUpperCase()}</button>`).join('')}</div>
      <div class="match-col">${imgsCol.map(w=>`<button class="match-item img" data-i="${w.i}">${w.e}</button>`).join('')}</div>
    </div>`, '🧝');
  function select(side, btn, i){
    if(btn.classList.contains('done')) return;
    if(!pending || pending.side === side){
      body.querySelectorAll(`.match-item.${side}`).forEach(b=>b.classList.remove('sel'));
      btn.classList.add('sel');
      pending = {side, btn, i};
      sndFlip();
      return;
    }
    attempts++;
    const prev = pending.btn;
    if(pending.i === i){
      sndGood(); speak(items[i].en);
      prev.classList.remove('sel'); prev.classList.add('done');
      btn.classList.add('done');
      doneCount++; pending = null;
      if(doneCount === items.length){
        const gems = attempts<=items.length+1?3 : attempts<=items.length+4?2 : 1;
        setTimeout(()=>stopReward(ri, si, gems, `Todo emparejado en ${attempts} intentos`, replay), 500);
      }
    }else{
      sndBad();
      prev.classList.remove('sel'); prev.classList.add('bad'); btn.classList.add('bad');
      pending = null;
      setTimeout(()=>{ prev.classList.remove('bad'); btn.classList.remove('bad'); }, 500);
    }
  }
  body.querySelectorAll('.match-item.word').forEach(b=>{ b.onclick = ()=>select('word', b, +b.dataset.i); });
  body.querySelectorAll('.match-item.img').forEach(b=>{ b.onclick = ()=>select('img', b, +b.dataset.i); });
}

function gameFind(ri, si, replay){

  const sceneHeight = Math.max(220, (slots[0]?.rows||3)*105 + 20);

  const found = new Set();

  const results = [];
  function draw(){
    firstTry = true;
    const target = items[order[round]];
    const body = gameShell(ri, `

function gameMemory(ri, si, replay){
  const r = REALMS[ri];
  const pairs = pickWords(r, 4);
  const cards = shuffle([
    ...pairs.map(w=>({key:w.en, type:'e', label:w.e})),
    ...pairs.map(w=>({key:w.en, type:'t', label:w.en.toUpperCase()}))
  ]);
  let flipped = [], attempts = 0, found = 0, lock = false;
  const body = gameShell(ri, `
    <h2 style="margin:4px 0">🧠 Cofres gemelos</h2>
    <p class="hint" style="margin:0">Intentos: <b id="attCnt">0</b></p>
    <div class="mgrid">
      ${cards.map((c,i)=>`<button class="mcard" data-i="${i}">🎁</button>`).join('')}
    </div>`, '🎁');
  body.querySelectorAll('.mcard').forEach(btn=>{
    btn.onclick = ()=>{
      if(lock) return;
      const c = cards[+btn.dataset.i];
      if(btn.classList.contains('flip') || btn.classList.contains('done')) return;
      sndFlip();
      btn.classList.add('flip');
      btn.innerHTML = c.type==='e' ? c.label : `<span class="wtxt">${c.label}</span>`;
      flipped.push({btn, c});
      if(flipped.length === 2){
        lock = true; attempts++;
        body.querySelector('#attCnt').textContent = attempts;
        const [a,b] = flipped;
        if(a.c.key === b.c.key && a.c.type !== b.c.type){
          sndGood(); speak(a.c.key);
          a.btn.classList.add('done'); b.btn.classList.add('done');
          found++; flipped = []; lock = false;
          if(found === pairs.length){
            const gems = attempts<=6?3 : attempts<=9?2 : 1;
            setTimeout(()=>stopReward(ri, si, gems, `Parejas encontradas en ${attempts} intentos`, replay), 600);
          }
        }else{
          sndBad();
          setTimeout(()=>{
            [a,b].forEach(x=>{ x.btn.classList.remove('flip'); x.btn.textContent = '🎁'; });
            flipped = []; lock = false;
          }, 850);
        }
      }
    };
  });
}

function gameSpell(ri, si, replay){
  const r = REALMS[ri];
  const words = shuffle(r.words.filter(w=>!w.en.includes(' ') && w.en.length<=6)).slice(0,4);
  let idx = 0, wins = 0, firstTry = true;

    firstTry = true;
    const w = words[idx];
    const letters = w.en.toUpperCase().split('');
    const tiles = shuffle(letters.map((ch,i)=>({ch,i})));
    let filled = [];
    const body = gameShell(ri, `
      ${dots(idx, words.length, results)}
      <div class="word-emoji">${w.e}</div>

      </div>
      <div class="slots" id="slots">${letters.map(()=>'<div class="slot"></div>').join('')}</div>
      <div class="tiles">${tiles.map((t,k)=>`<button class="tile" data-k="${k}">${t.ch}</button>`).join('')}</div>
      <div class="controls"><button class="btn coral" id="delBtn">⬅ Borrar</button></div>
      <div class="feedback" id="fb"></div>`, '🧩');
    const slots = body.querySelectorAll('.slot');
    const fb = body.querySelector('#fb');
    const play = ()=>speak(w.en);
    setTimeout(play, 350);
    body.querySelector('#hearBtn').onclick = play;
    body.querySelector('#peekBtn').onclick = ()=>{
      firstTry = false;
      fb.className = 'feedback'; fb.textContent = w.en.toUpperCase();
      setTimeout(()=>{ if(fb.textContent === w.en.toUpperCase()) fb.textContent = ''; }, 1500);
    };
    function refresh(){
      slots.forEach((s,i)=>{ s.textContent = filled[i]?filled[i].ch:''; s.classList.toggle('filled', !!filled[i]); });
    }
    function check(){
      const word = filled.map(f=>f.ch).join('');
      if(word === w.en.toUpperCase()){
        sndGood(); speak(w.en);
        fb.className = 'feedback ok'; fb.textContent = '¡Hechizo completado! ✨';
        if(firstTry) wins++;
        results[idx] = firstTry;
        setTimeout(()=>{
          idx++;
          if(idx < words.length) draw();
          else stopReward(ri, si, gemsFromScore(wins, words.length), `Has escrito bien ${wins} de ${words.length} hechizos`, replay);
        }, 1000);
      }else{
        sndBad(); firstTry = false;
        fb.className = 'feedback no'; fb.textContent = 'Uy, casi… ¡otra vez! 🔁';
        setTimeout(()=>{
          filled.forEach(f=>{ body.querySelector(`.tile[data-k="${f.k}"]`).disabled = false; });
          filled = []; refresh(); fb.textContent = '';
        }, 900);
      }
    }
    body.querySelectorAll('.tile').forEach(btn=>{
      btn.onclick = ()=>{
        if(filled.length >= letters.length) return;
        sndFlip();
        btn.disabled = true;
        filled.push({ch:btn.textContent, k:btn.dataset.k});
        refresh();
        if(filled.length === letters.length) setTimeout(check, 250);
      };
    });
    body.querySelector('#delBtn').onclick = ()=>{
      const last = filled.pop();
      if(last){ body.querySelector(`.tile[data-k="${last.k}"]`).disabled = false; refresh(); }
    };
  }
  draw();
}

function gameBuild(ri, si, replay){

  let idx = 0, wins = 0, firstTry = true;
  const results = [];
  function draw(){
    firstTry = true;
    const w = phrases[idx];

    const tiles = shuffle(tokens.map((t,i)=>({t,i})));

    const body = gameShell(ri, `
      ${dots(idx, phrases.length, results)}
      <div class="word-emoji ${emojiLen(w.e)>2?'long':''}">${w.e}</div>
      <div class="word-es" style="font-size:1.1rem"><b>${w.es}</b></div>

          refresh();
        };
      });

    function check(){
      const built = answer.map(a=>a.t).join(' ');

        sndGood(); speak(w.en);
        ans.classList.add('good');
        fb.className = 'feedback ok'; fb.textContent = '¡Pergamino reparado! ✨';

        }, 1100);

        ans.classList.add('bad');

        speak(w.en, 0.75);

        }, 1100);
      }
    }
    body.querySelectorAll('#tiles .tile').forEach(btn=>{
      btn.onclick = ()=>{
        sndFlip();
        btn.disabled = true;
        answer.push({t:btn.textContent, k:btn.dataset.k});

function gameSpeak(ri, si, replay){
  const r = REALMS[ri];
  const isPhrase = !!r.phrases;
  const words = pickWords(r, 4);
  let idx = 0, wins = 0, tries = 0;
  const results = [];
  function next(){
    idx++;
    if(idx < words.length) draw();
    else stopReward(ri, si, gemsFromScore(wins, words.length), `Has pronunciado bien ${wins} de ${words.length}`, replay);
  }
  function draw(){
    tries = 0;
    const hasSR = !!SR && !state.noMic;
    const w = words[idx];
    const body = gameShell(ri, `
      ${dots(idx, words.length, results)}
      <div class="word-emoji ${emojiLen(w.e)>2?'long':''}">${w.e}</div>
      <div class="word-en ${isPhrase?'phrase':''}" style="color:${r.color}">${isPhrase?w.en:w.en.toUpperCase()}</div>
      <div class="word-es">${w.es}</div>
      <button class="btn ghost" id="hearBtn">🔊 Escuchar cómo suena</button><br>
      ${hasSR
        ? `<button class="mic-btn" id="micBtn" aria-label="Hablar">🎤</button>
           <div class="feedback" id="fb">Pulsa el micro y di la palabra mágica</div>
           <div class="heard" id="heard"></div>`
        : `<div class="feedback">Dilo en voz alta.<br>Un adulto marca cómo ha salido:</div>
           <div class="controls">
             <button class="btn mint big" id="okBtn">✔️ ¡Lo dijo bien!</button>
             <button class="btn coral" id="koBtn">Otra vez</button>
           </div>`}
    `, '🚪');
    body.querySelector('#hearBtn').onclick = ()=>speak(w.en);
    setTimeout(()=>speak(w.en), 350);
    if(hasSR){
      const mic = body.querySelector('#micBtn');
      const fb = body.querySelector('#fb');
      const heard = body.querySelector('#heard');
      function fail(silent){
        tries++;
        sndBad();
        fb.className = 'feedback no';
        if(tries >= 3){
          fb.textContent = 'No pasa nada, ¡a la siguiente! 💪';
          results[idx] = false;
          setTimeout(next, 1300);
        }else{
          fb.textContent = silent ? 'No te he oído, ¡inténtalo otra vez! 🎤' : 'Casi… escúchala y repite 🔁';
          speak(w.en, 0.75);
        }
      }
      mic.onclick = ()=>{
        stopSR();
        speechSynthesis.cancel();
        const rec = new SR();
        activeSR = rec;
        rec.lang = 'en-US'; rec.interimResults = false; rec.maxAlternatives = 5;
        mic.classList.add('listening');
        fb.className = 'feedback'; fb.textContent = 'Te escucho… 👂';
        heard.textContent = '';
        let got = false;
        rec.onresult = (ev)=>{
          got = true;
          const alts = Array.from(ev.results[0]).map(x=>x.transcript);
          heard.textContent = 'He oído: "' + alts[0] + '"';
          if(alts.some(t=>matchesAnswer(t, w.en))){
            sndGood(); fb.className = 'feedback ok'; fb.textContent = '¡La puerta se abre! ✨';
            wins++; results[idx] = true;
            setTimeout(next, 1100);
          }else fail();
        };
        rec.onerror = (ev)=>{
          mic.classList.remove('listening');
          if(ev.error === 'not-allowed' || ev.error === 'service-not-allowed'){
            fb.className = 'feedback no';
            fb.textContent = 'El micrófono está bloqueado en este dispositivo';
            if(!body.querySelector('#switchBtn')){
              const sw = document.createElement('button');
              sw.className = 'btn berry'; sw.id = 'switchBtn';
              sw.textContent = '🙋 Jugar sin micrófono (valida un adulto)';
              sw.onclick = ()=>{ state.noMic = true; saveState(); draw(); };
              heard.after(sw);
            }
          } else if(!got) fail(true);
        };
        rec.onend = ()=>{ mic.classList.remove('listening'); if(!got && fb.textContent.startsWith('Te escucho')) fail(true); };
        try{ rec.start(); }catch(e){}
      };
    }else{
      body.querySelector('#okBtn').onclick = ()=>{ sndGood(); wins++; results[idx]=true; next(); };
      body.querySelector('#koBtn').onclick = ()=>{ sndBad(); speak(w.en, 0.75); tries++; if(tries>=3){ results[idx]=false; next(); } };
    }
  }
  draw();
}

function gameBoss(ri, si, replay){
  const r = REALMS[ri];
  const TOTAL = 6, NEED = 4;
  const rounds = shuffle(r.words).slice(0, TOTAL);
  let idx = 0, broken = 0, firstTry = true;
  function battleHead(){
    let sh = '';
    for(let i=0;i<NEED;i++) sh += `<span class="sh ${i<broken?'broken':''}">🛡️</span>`;
    return `
      <div class="battle-head">
        <div class="fighter"><span class="av">${state.hero||'🦸'}</span><div class="nm">Tú</div></div>
        <div class="vs">VS</div>
        <div class="fighter boss"><span class="av" id="bossAv">${r.guardian}</span><div class="nm">${r.guardianName}</div></div>
      </div>
      <div class="shields" id="shields">${sh}</div>
      <p class="hint" style="margin:2px 0">Rompe ${NEED} escudos acertando a la primera</p>`;
  }
  function draw(){
    const w = rounds[idx];
    const used = new Set([w.e]);
    const distract = shuffle(r.words).filter(x=>{
      if(x.en===w.en || used.has(x.e)) return false;
      used.add(x.e); return true;
    }).slice(0,3);
    const options = shuffle([w, ...distract]);
    firstTry = true;
    const body = gameShell(ri, `
      ${battleHead()}
      ${dots(idx, TOTAL)}
      <button class="btn mint" id="replayBtn">🔊 Escuchar otra vez</button>
      <div class="opts">
        ${options.map(o=>`<button class="opt ${emojiLen(o.e)>2?'long':''}" data-en="${o.en.replace(/"/g,'')}" aria-label="${o.es}">${o.e}</button>`).join('')}
      </div>`, r.guardian);
    const play = ()=>speak(w.en);
    setTimeout(play, 400);
    body.querySelector('#replayBtn').onclick = play;
    body.querySelectorAll('.opt').forEach(b=>{
      b.onclick = ()=>{
        if(b.dataset.en === w.en.replace(/"/g,'')){
          b.classList.add('good'); sndGood();
          speak(w.en, 0.9);
          if(firstTry && broken < NEED){
            broken++;
            sndHit();
            const av = body.querySelector('#bossAv');
            av.classList.add('hit');
            const shs = body.querySelectorAll('.shields .sh:not(.broken)');
            if(shs.length) shs[0].classList.add('broken');
            setTimeout(()=>av.classList.remove('hit'), 550);
          }
          setTimeout(()=>{
            idx++;
            if(idx < TOTAL && broken < NEED) draw();
            else finish();
          }, 1000);
        }else{
          b.classList.add('bad'); sndBad(); firstTry = false;
          setTimeout(()=>b.classList.remove('bad'), 500);
        }
      };
    });
  }
  function finish(){
    if(broken >= NEED){
      stopReward(ri, si, 3, `¡Has vencido a ${r.guardianName}! Escudos rotos: ${broken} de ${NEED}`, replay);
    }else{
      const ov = document.createElement('div');
      ov.className = 'overlay';
      ov.innerHTML = `
        <div class="reward">
          <div style="font-size:3rem">${r.guardian}</div>
          <h2>¡Casi lo tienes!</h2>
          <p>Necesitas romper ${NEED} escudos acertando a la primera.<br>Rompiste ${broken}. ¡Practica los retos del camino y vuelve más fuerte! 💪</p>
          <button class="btn sun big" id="rt">Reintentar 🔁</button>
          <button class="btn ghost" id="bk" style="margin-top:10px">Volver al camino</button>
        </div>`;
      document.body.appendChild(ov);
      ov.querySelector('#rt').onclick = ()=>{ ov.remove(); gameBoss(ri, si, replay); };
      ov.querySelector('#bk').onclick = ()=>{ ov.remove(); renderRealm(ri); };
    }
  }
  draw();
}

const GAME_RUN = {listen:gameListen, match:gameMatch, find:gameFind, memory:gameMemory, speak:gameSpeak, spell:gameSpell, build:gameBuild, trans:gameTrans, boss:gameBoss};

/* ============================================================
   FINAL
   ============================================================ */
function renderFinale(){
  stopSR(); stopFX(); setBg(null);
  confetti(); sndWin();
  setTimeout(confetti, 800);
  app.innerHTML = `
    <div class="screen">
    <div class="intro-sky" style="height:200px">
      <svg viewBox="0 0 400 200" preserveAspectRatio="xMidYMid slice">${svgStars(34, 400, 190, 23)}</svg>
      <span class="big-star" style="font-size:5.4rem">🌟</span>
    </div>
    <div class="glass" style="padding-top:84px">
      <h1 style="margin:6px 0">¡LO HAS CONSEGUIDO!</h1>
      <p style="font-size:1.5rem; letter-spacing:4px; margin:8px 0">${REALMS.map(r=>r.artifact).join(' ')}</p>
      <p>Has recuperado las <b>5 gemas</b> y la Estrella Mágica vuelve a brillar sobre todos los reinos.<br><br>
      El Dragón, el Unicornio, el Oso Polar, el Loro y el Búho te nombran…<br>
      <b style="font-size:1.3rem">🏅 ¡Héroe del Inglés! 🏅</b><br><br>
      Gemas conseguidas en total: <b>💎 ${state.gems}</b></p>
      <div style="font-size:2.6rem; margin:8px 0; filter:drop-shadow(0 4px 6px rgba(0,0,0,.2))">${state.hero||'🦸'}</div>
      <button class="btn sun big" id="againBtn">Seguir explorando 🗺️</button>
    </div>
    </div>`;
  document.getElementById('againBtn').onclick = renderWorld;
  window.scrollTo(0,0);
}

/* ============================================================
   ZONA DE PADRES
   ============================================================ */
function renderParent(){
  const ov = document.createElement('div');
  ov.className = 'overlay';
  ov.innerHTML = `
    <div class="panel">
      <h2>⚙️ Zona de padres</h2>
      <p style="margin-top:-8px; font-size:.8rem; color:#9A94B8">Modo Aventura · Versión 2 (gráficos pro)</p>
      <p>${REALMS.map(r=>{
        const p = realmProg(r.id);
        return r.icon+' '+r.name+': '+(p.boss?'✅ completado':'retos '+p.stop+'/'+STOP_PLOTS.length);
      }).join('<br>')}</p>
      <p>Gemas totales: 💎 ${state.gems}</p>
      <button class="btn berry" id="micModeBtn">${state.noMic?'🎤 Activar micrófono':'🙋 Modo sin micrófono (valida un adulto)'}</button>
      <button class="btn mint" id="heroBtn">🦸 Cambiar de héroe</button>
      <button class="btn coral" id="resetBtn">🗑️ Empezar la aventura de cero</button>
      <button class="btn ghost" id="closeBtn">Cerrar</button>
    </div>`;
  document.body.appendChild(ov);
  ov.querySelector('#micModeBtn').onclick = ()=>{ state.noMic = !state.noMic; saveState(); ov.remove(); };
  ov.querySelector('#heroBtn').onclick = ()=>{ ov.remove(); renderIntro(); };
  ov.querySelector('#resetBtn').onclick = ()=>{
    if(confirm('¿Seguro que quieres borrar toda la aventura y las gemas?')){
      state = {hero:null, gems:0, realms:{}, noMic:state.noMic}; saveState(); ov.remove(); renderIntro();
    }
  };
  ov.querySelector('#closeBtn').onclick = ()=>ov.remove();
  ov.onclick = (e)=>{ if(e.target === ov) ov.remove(); };
}

/* ============================================================
   ARRANQUE
   ============================================================ */
document.getElementById('homeBtn').onclick = ()=>{ stopSR(); renderWorld(); };
document.getElementById('parentBtn').onclick = renderParent;
loadState();
updateBadge();
if(state.hero) renderWorld(); else renderIntro();
</script>
