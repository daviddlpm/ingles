<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#3FA7F5">
<title>Mi Aventura en Inglés 🚀</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#28406B; --ink-soft:#5A7099;
    --sun:#FFC93C; --mint:#3EC9A7; --berry:#B067E8; --sea:#3FA7F5;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; min-height:100%;}
  body{
    font-family:'Nunito',system-ui,sans-serif; color:var(--ink);
    background:linear-gradient(180deg,#BDE3FF,#E9F7FF 40%,#F2FBF4);
    min-height:100vh; display:flex; flex-direction:column; align-items:center;
    padding:20px 16px 40px; overflow-x:hidden;
  }
  h1,h2{font-family:'Fredoka','Comic Sans MS',sans-serif;}

  .cloud{position:fixed; font-size:3rem; opacity:.5; z-index:0; animation:drift linear infinite; pointer-events:none;}
  @keyframes drift{from{transform:translateX(-120px);}to{transform:translateX(110vw);}}

  .top{text-align:center; z-index:1; margin-bottom:8px;}
  .top .fox{font-size:3.6rem; display:inline-block; animation:bob 2.4s ease-in-out infinite;}
  @keyframes bob{50%{transform:translateY(-8px) rotate(-4deg);}}
  .top h1{font-size:1.9rem; margin:6px 0 2px;}
  .top p{margin:0; color:var(--ink-soft); font-weight:700;}

  .cards{
    display:flex; flex-direction:column; gap:18px; width:100%; max-width:520px;
    margin-top:18px; z-index:1;
  }
  .game-card{
    display:flex; align-items:center; gap:16px; text-decoration:none; color:#fff;
    border-radius:30px; padding:22px 20px; box-shadow:0 8px 0 rgba(40,64,107,.2);
    transition:transform .1s; position:relative; overflow:hidden;
  }
  .game-card:active{transform:translateY(5px); box-shadow:0 3px 0 rgba(40,64,107,.2);}
  .game-card .ge{
    font-size:3.2rem; width:92px; height:92px; min-width:92px; border-radius:26px;
    background:rgba(255,255,255,.25); display:flex; align-items:center; justify-content:center;
  }
  .game-card .gi{flex:1;}
  .game-card .gn{font-family:'Fredoka'; font-weight:700; font-size:1.45rem; display:block;}
  .game-card .gd{font-weight:700; font-size:.95rem; opacity:.94; display:block; margin-top:4px; line-height:1.35;}
  .game-card .arrow{font-size:1.8rem;}
  .game-card .spark{position:absolute; font-size:1.2rem; opacity:.4; pointer-events:none;}

  .classic{background:linear-gradient(120deg,#3FA7F5,#3EC9A7);}
  .adventure{background:linear-gradient(120deg,#8E7CF0,#E86BB3);}

  .foot{margin-top:26px; color:var(--ink-soft); font-weight:700; font-size:.85rem; text-align:center; z-index:1;}

  @media (min-width:560px){
    .cards{flex-direction:row;}
    .game-card{flex-direction:column; text-align:center; padding:26px 18px; flex:1;}
    .game-card .arrow{display:none;}
  }
  @media (prefers-reduced-motion:reduce){ *{animation:none !important; transition:none !important;} }
</style>
</head>
<body>

<div class="cloud" style="top:12%; animation-duration:55s;">☁️</div>
<div class="cloud" style="top:45%; animation-duration:80s; animation-delay:-35s;">☁️</div>
<div class="cloud" style="top:75%; animation-duration:100s; animation-delay:-60s; font-size:2.2rem;">☁️</div>

<div class="top">
  <span class="fox">🦊</span>
  <h1>Mi Aventura en Inglés</h1>
  <p>¿A qué quieres jugar hoy?</p>
</div>

<div class="cards">
  <a class="game-card classic" href="clasico.html">
    <span class="spark" style="top:10px; right:16px">⭐</span>
    <span class="spark" style="bottom:12px; left:14px">✨</span>
    <span class="ge">📚</span>
    <span class="gi">
      <span class="gn">Mundo de Niveles</span>
      <span class="gd">4 niveles · 37 mundos · gana estrellas y pegatinas · reto del día</span>
    </span>
    <span class="arrow">▶</span>
  </a>
  <a class="game-card adventure" href="aventura.html">
    <span class="spark" style="top:12px; right:18px">🌟</span>
    <span class="spark" style="bottom:10px; left:16px">💎</span>
    <span class="ge">🗺️</span>
    <span class="gi">
      <span class="gn">La Estrella Mágica</span>
      <span class="gd">Aventura por 5 reinos de fantasía · recupera las gemas y vence al Dragón</span>
    </span>
    <span class="arrow">▶</span>
  </a>
</div>

<p class="foot">Tu progreso se guarda en cada juego ⭐💎</p>

<script>
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
</body>
</html>
