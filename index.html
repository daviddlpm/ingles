<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#3FA7F5">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Mi Aventura en Inglés 🚀</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --sky1:#BDE3FF; --sky2:#E9F7FF;
    --ink:#28406B; --ink-soft:#5A7099;
    --card:#FFFFFF;
    --sun:#FFC93C; --coral:#FF7B54; --mint:#3EC9A7; --berry:#B067E8; --sea:#3FA7F5;
    --shadow:0 6px 0 rgba(40,64,107,.14);
    --radius:26px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Nunito',system-ui,sans-serif;
    background:linear-gradient(180deg,var(--sky1),var(--sky2) 40%,#F2FBF4);
    color:var(--ink);
    min-height:100vh;
    overflow-x:hidden;
  }
  h1,h2,h3{font-family:'Fredoka','Comic Sans MS',sans-serif;}

  /* nubes flotantes */
  .cloud{position:fixed; font-size:3rem; opacity:.5; z-index:0; animation:drift linear infinite; pointer-events:none;}
  @keyframes drift{from{transform:translateX(-120px);}to{transform:translateX(110vw);}}

  header{
    position:sticky; top:0; z-index:50;
    display:flex; align-items:center; gap:8px;
    padding:10px 12px;
    background:rgba(255,255,255,.88); backdrop-filter:blur(8px);
    border-bottom:3px solid rgba(40,64,107,.08);
  }
  header .title{font-family:'Fredoka'; font-weight:700; font-size:1.05rem; flex:1; letter-spacing:.3px;}
  .star-badge{
    background:var(--sun); border-radius:999px; padding:6px 12px;
    font-weight:800; font-size:.95rem; box-shadow:0 3px 0 rgba(180,120,0,.35);
    white-space:nowrap;
  }
  .icon-btn{
    background:#fff; border:3px solid rgba(40,64,107,.12); border-radius:16px;
    font-size:1.15rem; padding:6px 9px; cursor:pointer; box-shadow:var(--shadow);
  }
  .icon-btn:active{transform:translateY(3px); box-shadow:none;}

  main{max-width:640px; margin:0 auto; padding:18px 16px 90px; position:relative; z-index:1;}

  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    font-family:'Fredoka'; font-weight:600; font-size:1.15rem;
    border:none; border-radius:var(--radius); padding:14px 26px;
    cursor:pointer; color:#fff; background:var(--sea);
    box-shadow:0 5px 0 rgba(0,0,0,.18); transition:transform .08s;
  }
  .btn:active{transform:translateY(4px); box-shadow:0 1px 0 rgba(0,0,0,.18);}
  .btn.sun{background:var(--sun); color:#6B4A00;}
  .btn.coral{background:var(--coral);}
  .btn.mint{background:var(--mint);}
  .btn.berry{background:var(--berry);}
  .btn.ghost{background:#fff; color:var(--ink); border:3px solid rgba(40,64,107,.14); box-shadow:var(--shadow);}
  .btn.big{font-size:1.45rem; padding:18px 32px; border-radius:32px;}
  .btn:disabled{opacity:.5; cursor:default;}
  .btn:focus-visible,.icon-btn:focus-visible,.opt:focus-visible,.mcard:focus-visible,.tile:focus-visible{outline:4px solid #FF8A3D; outline-offset:3px;}

  /* ===== portada ===== */
  .hero{text-align:center; margin:2px 0 18px;}
  .hero .fox{font-size:3.4rem; display:inline-block; animation:bob 2.4s ease-in-out infinite;}
  @keyframes bob{50%{transform:translateY(-8px) rotate(-4deg);}}
  .hero h1{font-size:1.8rem; margin:2px 0;}
  .hero p{margin:0; color:var(--ink-soft); font-weight:700;}
  .medal-row{display:flex; justify-content:center; gap:8px; font-size:1.5rem; margin-top:4px; min-height:1.8rem;}

  .daily{
    background:linear-gradient(120deg,#FFF3D6,#FFE3EC);
    border-radius:var(--radius); padding:14px 16px; margin-bottom:16px;
    display:flex; align-items:center; gap:12px; cursor:pointer; border:none; width:100%;
    box-shadow:var(--shadow); text-align:left; font-family:'Nunito';
  }
  .daily:active{transform:translateY(3px); box-shadow:none;}
  .daily .de{font-size:2.2rem;}
  .daily .dt{flex:1;}
  .daily .dt b{font-family:'Fredoka'; font-size:1.15rem; color:var(--ink); display:block;}
  .daily .dt span{color:var(--ink-soft); font-weight:700; font-size:.9rem;}
  .streak{background:#fff; border-radius:999px; padding:6px 12px; font-weight:800; color:#D95700;}

  .lvl-card{
    width:100%; border:none; text-align:left; cursor:pointer;
    background:var(--card); border-radius:var(--radius); padding:16px;
    box-shadow:var(--shadow); margin-bottom:14px; font-family:'Nunito';
    display:flex; gap:14px; align-items:center;
  }
  .lvl-card:active{transform:translateY(3px); box-shadow:none;}
  .lvl-card .le{
    font-size:2.4rem; width:70px; height:70px; min-width:70px; border-radius:22px;
    display:flex; align-items:center; justify-content:center; color:#fff;
  }
  .lvl-card .li{flex:1;}
  .lvl-card .ln{font-family:'Fredoka'; font-weight:700; font-size:1.25rem; color:var(--ink);}
  .lvl-card .ld{color:var(--ink-soft); font-weight:700; font-size:.9rem;}
  .pbar{height:12px; background:rgba(40,64,107,.1); border-radius:6px; margin-top:8px; overflow:hidden;}
  .pbar > div{height:100%; border-radius:6px; transition:width .4s;}
  .lvl-card.locked{opacity:.6;}
  .lvl-card.locked .le{filter:grayscale(1);}

  /* ===== mapa ===== */
  .path{display:flex; flex-direction:column; gap:2px;}
  .stop{
    display:flex; align-items:center; gap:14px; padding:8px 4px;
    border:none; background:none; cursor:pointer; text-align:left; width:100%;
    font-family:'Nunito'; color:inherit;
  }
  .stop:nth-child(even){flex-direction:row-reverse; text-align:right;}
  .stop:nth-child(even) .stop-info{align-items:flex-end;}
  .bubble{
    width:84px; height:84px; min-width:84px; border-radius:50%;
    display:flex; align-items:center; justify-content:center; font-size:2.3rem;
    border:5px solid #fff; box-shadow:0 6px 0 rgba(40,64,107,.18); position:relative;
  }
  .bubble .num{
    position:absolute; top:-6px; left:-6px; background:#fff; color:var(--ink);
    font-family:'Fredoka'; font-weight:700; font-size:.85rem;
    width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    box-shadow:0 2px 0 rgba(40,64,107,.2);
  }
  .stop-info{display:flex; flex-direction:column; gap:2px;}
  .stop-info .nm{font-family:'Fredoka'; font-weight:600; font-size:1.12rem;}
  .stop-info .st{color:#C9900A; font-weight:800; letter-spacing:1px;}
  .stop.locked .bubble{filter:grayscale(1); opacity:.55;}
  .stop.locked .nm{color:var(--ink-soft);}
  .connector{align-self:center; width:6px; height:24px; border-radius:3px; background:rgba(40,64,107,.15);}

  /* ===== unidad ===== */
  .unit-head{text-align:center; margin-bottom:16px;}
  .unit-head .big-emoji{font-size:3.2rem;}
  .games{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
  .gcard{
    background:var(--card); border-radius:var(--radius); padding:18px 10px;
    text-align:center; cursor:pointer; border:none; box-shadow:var(--shadow);
    display:flex; flex-direction:column; gap:6px; align-items:center; font-family:'Nunito';
  }
  .gcard:active{transform:translateY(3px); box-shadow:none;}
  .gcard .ge{font-size:2.3rem;}
  .gcard .gn{font-family:'Fredoka'; font-weight:600; font-size:1.08rem; color:var(--ink);}
  .gcard .gd{color:var(--ink-soft); font-weight:700; font-size:.85rem;}
  .gcard .gs{color:#C9900A; font-weight:800; font-size:1rem; letter-spacing:1px;}

  /* ===== zona de juego ===== */
  .stage{
    background:var(--card); border-radius:32px; padding:22px 16px;
    box-shadow:0 10px 0 rgba(40,64,107,.10); text-align:center;
  }
  .progress-dots{display:flex; gap:6px; justify-content:center; margin-bottom:14px; flex-wrap:wrap;}
  .dot{width:11px; height:11px; border-radius:50%; background:rgba(40,64,107,.15);}
  .dot.on{background:var(--mint);}
  .dot.now{background:var(--sun); transform:scale(1.3);}
  .word-emoji{font-size:4.8rem; line-height:1.1; margin:6px 0;}
  .word-emoji.long{font-size:3rem;}
  .word-en{font-family:'Fredoka'; font-weight:700; font-size:2.1rem; letter-spacing:.5px; margin:2px 0;}
  .word-en.phrase{font-size:1.5rem;}
  .word-es{color:var(--ink-soft); font-weight:700; font-size:1.05rem; margin-bottom:8px;}
  .controls{display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-top:14px;}
  .hint{color:var(--ink-soft); font-weight:700; font-size:.95rem; margin-top:10px;}

  .opts{display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-top:14px;}
  .opt{
    background:#F4F9FF; border:4px solid rgba(40,64,107,.1); border-radius:24px;
    font-size:3rem; padding:18px 6px; cursor:pointer; transition:transform .08s;
  }
  .opt.long{font-size:1.9rem; padding:22px 6px;}
  .opt:active{transform:scale(.95);}
  .opt.good{background:#D9F7E8; border-color:var(--mint); animation:pop .4s;}
  .opt.bad{background:#FFE3E0; border-color:var(--coral); animation:shake .4s;}
  @keyframes pop{50%{transform:scale(1.12);}}
  @keyframes shake{25%{transform:translateX(-8px);}75%{transform:translateX(8px);}}

  /* memoria */
  .mgrid{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:10px;}
  .mcard{
    aspect-ratio:3/3.4; border-radius:18px; border:none; cursor:pointer;
    background:var(--sea); color:#fff; font-size:2rem;
    display:flex; align-items:center; justify-content:center;
    font-family:'Fredoka'; font-weight:600;
    box-shadow:0 4px 0 rgba(0,0,0,.18);
  }
  .mcard.flip{background:#fff; color:var(--ink); border:4px solid rgba(40,64,107,.12); box-shadow:var(--shadow);}
  .mcard.done{background:#D9F7E8; border:4px solid var(--mint); color:var(--ink); cursor:default;}
  .mcard .wtxt{font-size:1rem; padding:4px; word-break:break-word;}

  /* deletreo y frases */
  .slots{display:flex; gap:6px; justify-content:center; flex-wrap:wrap; margin:14px 0; min-height:52px;}
  .slot{
    width:44px; height:52px; border-radius:12px; background:#F4F9FF;
    border:3px dashed rgba(40,64,107,.25);
    font-family:'Fredoka'; font-weight:700; font-size:1.6rem;
    display:flex; align-items:center; justify-content:center; color:var(--ink);
  }
  .slot.filled{border-style:solid; border-color:var(--sea); background:#fff;}
  .tiles{display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin-top:6px;}
  .tile{
    min-width:48px; padding:10px 12px; border-radius:14px; border:none; cursor:pointer;
    background:var(--sun); color:#6B4A00; font-family:'Fredoka'; font-weight:700; font-size:1.4rem;
    box-shadow:0 4px 0 rgba(180,120,0,.35);
  }
  .tile.word{font-size:1.15rem; background:var(--berry); color:#fff; box-shadow:0 4px 0 rgba(0,0,0,.2);}
  .tile:disabled{opacity:.25; box-shadow:none; transform:translateY(3px);}
  .tile:active{transform:translateY(3px); box-shadow:none;}
  .answer-row{
    min-height:56px; background:#F4F9FF; border-radius:18px; border:3px dashed rgba(40,64,107,.2);
    display:flex; gap:8px; flex-wrap:wrap; justify-content:center; align-items:center; padding:8px; margin:12px 0;
  }
  .answer-row .tile.word{background:var(--sea);}
  .answer-row.good{border-color:var(--mint); background:#D9F7E8;}
  .answer-row.bad{border-color:var(--coral); background:#FFE3E0; animation:shake .4s;}

  /* hablar */
  .mic-btn{
    width:106px; height:106px; border-radius:50%; border:none; cursor:pointer;
    background:radial-gradient(circle at 35% 30%, #FF9A76, var(--coral));
    color:#fff; font-size:2.8rem; box-shadow:0 7px 0 rgba(0,0,0,.2); margin-top:6px;
  }
  .mic-btn:active{transform:translateY(4px); box-shadow:0 2px 0 rgba(0,0,0,.2);}
  .mic-btn.listening{animation:pulse 1s infinite; background:radial-gradient(circle at 35% 30%, #7DE0C6, var(--mint));}
  @keyframes pulse{50%{transform:scale(1.08); box-shadow:0 0 0 16px rgba(62,201,167,.18);}}
  .feedback{min-height:2.2rem; font-family:'Fredoka'; font-weight:600; font-size:1.2rem; margin-top:12px;}
  .feedback.ok{color:var(--mint);}
  .feedback.no{color:var(--coral);}
  .heard{color:var(--ink-soft); font-weight:700; font-size:.92rem; min-height:1.2rem;}

  /* recompensa */
  .overlay{
    position:fixed; inset:0; background:rgba(40,64,107,.45); z-index:100;
    display:flex; align-items:center; justify-content:center; padding:20px;
  }
  .reward{
    background:#fff; border-radius:36px; padding:28px 24px; text-align:center;
    max-width:380px; width:100%; box-shadow:0 14px 0 rgba(0,0,0,.18); animation:pop .4s;
    max-height:90vh; overflow:auto;
  }
  .reward h2{margin:4px 0 8px; font-size:1.6rem;}
  .rstars{font-size:2.5rem; letter-spacing:4px; margin:8px 0;}
  .rstars .s{opacity:.25; display:inline-block;}
  .rstars .s.fill{opacity:1; animation:starpop .45s both;}
  @keyframes starpop{0%{transform:scale(0) rotate(-40deg);}70%{transform:scale(1.4);}100%{transform:scale(1);}}
  .reward p{color:var(--ink-soft); font-weight:700; margin:6px 0 14px;}
  .new-sticker{background:#FFF3D6; border-radius:20px; padding:10px; margin:8px 0; font-weight:800;}
  .new-sticker .se{font-size:2.6rem; display:block;}

  .confetti{position:fixed; top:-20px; width:12px; height:12px; z-index:200; border-radius:3px; pointer-events:none; animation:fall linear forwards;}
  @keyframes fall{to{transform:translateY(110vh) rotate(720deg);}}

  /* álbum */
  .album-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-top:14px;}
  .sticker{
    aspect-ratio:1; background:#fff; border-radius:20px; box-shadow:var(--shadow);
    display:flex; align-items:center; justify-content:center; font-size:2.2rem;
  }
  .sticker.locked{filter:grayscale(1); opacity:.35; font-size:1.6rem;}

  .panel{background:#fff; border-radius:28px; padding:22px; max-width:400px; width:100%; box-shadow:0 12px 0 rgba(0,0,0,.15); max-height:88vh; overflow:auto;}
  .panel h2{margin-top:0;}
  .panel .btn{width:100%; margin-top:10px;}
  .panel p{color:var(--ink-soft); font-weight:600; font-size:.95rem;}
  .panel table{width:100%; font-weight:700; font-size:.95rem; border-collapse:collapse;}
  .panel td{padding:4px 2px;}
  .panel td:last-child{text-align:right; color:#C9900A;}

  .back-row{display:flex; justify-content:flex-start; margin-bottom:12px;}

  @media (max-width:420px){
    .word-emoji{font-size:4rem;}
    .word-en{font-size:1.8rem;}
    .opt{font-size:2.5rem; padding:14px 6px;}
    .bubble{width:72px; height:72px; min-width:72px; font-size:1.9rem;}
    .slot{width:36px; height:46px; font-size:1.3rem;}
    .album-grid{grid-template-columns:repeat(3,1fr);}
  }
  @media (prefers-reduced-motion:reduce){
    *{animation:none !important; transition:none !important;}
  }
</style>
</head>
<body>

<div class="cloud" style="top:12%; animation-duration:55s;">☁️</div>

<div class="cloud" style="top:70%; animation-duration:95s; animation-delay:-60s; font-size:2.2rem;">☁️</div>

<header>
  <button class="icon-btn" id="homeBtn" aria-label="Inicio">🏠</button>
  <div class="title">Mi Aventura en Inglés</div>
  <div class="star-badge" id="starBadge">⭐ 0</div>
  <button class="icon-btn" id="albumBtn" aria-label="Álbum de pegatinas">🎒</button>
  <button class="icon-btn" id="parentBtn" aria-label="Zona de padres">⚙️</button>
</header>

<main id="app"></main>

let state = { stars:{}, unlockAll:false, noMic:false, daily:{}, slowTTS:false };
function loadState(){
  try{
    const raw = localStorage.getItem('aventuraInglesPro');
    if(raw) state = Object.assign(state, JSON.parse(raw));
  }catch(e){}
}
function saveState(){ try{ localStorage.setItem('aventuraInglesPro', JSON.stringify(state)); }catch(e){} }

function ukey(li, ui){ return LEVELS[li].id + '.' + LEVELS[li].units[ui].id; }
function getStars(li, ui, g){ return (state.stars[ukey(li,ui)]||{})[g]||0; }
function setStars(li, ui, g, n){
  const k = ukey(li,ui);
  if(!state.stars[k]) state.stars[k] = {};
  if(n > (state.stars[k][g]||0)){ state.stars[k][g] = n; saveState(); }
}
function unitStars(li, ui){ return LEVELS[li].games.reduce((a,g)=>a+getStars(li,ui,g),0); }
function unitMax(li){ return LEVELS[li].games.length * STARS_PER_GAME; }
function levelStars(li){ return LEVELS[li].units.reduce((a,_,ui)=>a+unitStars(li,ui),0); }
function levelMax(li){ return LEVELS[li].units.length * unitMax(li); }
function dailyStars(){ return Object.values(state.daily).reduce((a,b)=>a+b,0); }
function totalStars(){ return LEVELS.reduce((a,_,li)=>a+levelStars(li),0) + dailyStars(); }
function grandMax(){ return LEVELS.reduce((a,_,li)=>a+levelMax(li),0); }
function levelUnlocked(li){ return state.unlockAll || li===0 || levelStars(li-1) >= LEVELS[li].need; }
function unitUnlocked(li, ui){ return state.unlockAll || ui===0 || unitStars(li,ui-1) >= UNLOCK_UNIT; }
function updateBadge(){ document.getElementById('starBadge').textContent = '⭐ ' + totalStars(); }
function todayKey(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function streak(){
  let n = 0; const d = new Date();
  for(;;){
    const k = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    if(state.daily[k]){ n++; d.setDate(d.getDate()-1); }
    else if(n===0 && k===todayKey()){ d.setDate(d.getDate()-1); } // hoy aún sin hacer no rompe la racha de ayer
    else break;
  }
  return n;
}

/* ============================================================

let audioCtx = null;
function tone(seq){
  try{
    if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    let t = audioCtx.currentTime;
    seq.forEach(([f,d])=>{
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.type = 'triangle'; o.frequency.value = f;
      g.gain.setValueAtTime(.18, t); g.gain.exponentialRampToValueAtTime(.001, t+d);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(t); o.stop(t+d); t += d*0.9;
    });
  }catch(e){}
}
const sndGood = ()=>tone([[523,.1],[659,.1],[784,.15],[1046,.25]]);
const sndBad  = ()=>tone([[220,.12],[200,.12],[180,.25]]);
const sndStar = ()=>tone([[880,.07],[1175,.07],[1567,.15]]);
const sndFlip = ()=>tone([[600,.04],[800,.05]]);
const sndJump = ()=>tone([[300,.08],[600,.15]]);

let enVoice = null;
function pickVoice(){
  const vs = speechSynthesis.getVoices();
  if(!vs.length) return;
  enVoice = vs.find(v=>/en[-_](GB|US)/i.test(v.lang) && /google/i.test(v.name))
         || vs.find(v=>/^en[-_]/i.test(v.lang)) || null;
}
if('speechSynthesis' in window){ pickVoice(); speechSynthesis.onvoiceschanged = pickVoice; }
function speak(text, rate){
  if(!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US'; u.rate = rate || (state.slowTTS ? 0.65 : 0.85); u.pitch = 1.05;
  if(enVoice) u.voice = enVoice;
  window.speechSynthesis.speak(u);
}

const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
function normalize(s){
  return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')
          .replace(/[^a-z0-9 ]/g,' ').replace(/\s+/g,' ').trim();
}
function lev(a,b){
  const m=a.length,n=b.length; if(!m) return n; if(!n) return m;
  const d=Array.from({length:m+1},(_,i)=>[i,...Array(n).fill(0)]);
  for(let j=1;j<=n;j++) d[0][j]=j;
  for(let i=1;i<=m;i++) for(let j=1;j<=n;j++)
    d[i][j]=Math.min(d[i-1][j]+1,d[i][j-1]+1,d[i-1][j-1]+(a[i-1]===b[j-1]?0:1));
  return d[m][n];
}
function matchesAnswer(transcript, target){
  const t = normalize(transcript);
  const tgt = normalize(target);
  if(!t) return false;
  if(t === tgt) return true;
  const tgtWords = tgt.split(' ');
  const tWords = t.split(' ');
  if(tgtWords.length === 1){
    if(tWords.includes(tgt)) return true;
    if(DIGIT_MAP[tgt] && tWords.includes(DIGIT_MAP[tgt])) return true;
    if(HOMOPHONES[tgt] && tWords.some(w=>HOMOPHONES[tgt].includes(w))) return true;
    const tol = tgt.length >= 5 ? 2 : (tgt.length >= 4 ? 1 : 0);
    return tWords.some(w => lev(w, tgt) <= tol);
  }
  if(t.includes(tgt)) return true;
  // frase: bastante parecido en conjunto o la mayoría de palabras presentes
  if(lev(t, tgt) <= Math.max(2, Math.floor(tgt.length * 0.28))) return true;
  const stop = new Set(['a','an','the','to','is','it','i']);
  const key = tgtWords.filter(w=>!stop.has(w));
  const hits = key.filter(w => tWords.some(x => lev(x,w) <= (w.length>=5?2:1))).length;
  return key.length > 0 && hits / key.length >= 0.6;
}

const app = document.getElementById('app');
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function starsRow(n){ let s=''; for(let i=0;i<5;i++) s += i<n?'★':'☆'; return s; }
function emojiLen(e){ return Array.from(e).length; }
function confetti(){
  const colors = ['#FF7B54','#FFC93C','#3EC9A7','#3FA7F5','#B067E8','#FF5E8A'];
  for(let i=0;i<70;i++){
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random()*100 + 'vw';
    c.style.background = colors[Math.floor(Math.random()*colors.length)];
    c.style.animationDuration = (2 + Math.random()*2) + 's';
    c.style.animationDelay = (Math.random()*0.6) + 's';
    document.body.appendChild(c);
    setTimeout(()=>c.remove(), 4500);
  }
}
function miniConfetti(x, y){
  const colors = ['#FFC93C','#3EC9A7','#3FA7F5','#B067E8'];
  for(let i=0;i<12;i++){
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = (x + (Math.random()-0.5)*60) + 'px';
    c.style.top = (y + (Math.random()-0.5)*20) + 'px';
    c.style.width = '8px'; c.style.height = '8px';
    c.style.background = colors[Math.floor(Math.random()*colors.length)];
    c.style.animationDuration = (0.8 + Math.random()*0.8) + 's';
    c.style.animationDelay = '0s';
    document.body.appendChild(c);
    setTimeout(()=>c.remove(), 2000);
  }
}
function starsFromScore(correct, total){
  const p = correct/total;
  if(p >= 0.95) return 5;
  if(p >= 0.8)  return 4;
  if(p >= 0.6)  return 3;
  if(p >= 0.35) return 2;
  return 1;
}
function dots(idx, total, doneArr){
  let h = '<div class="progress-dots">';
  for(let i=0;i<total;i++) h += `<div class="dot ${i===idx?'now':(doneArr&&doneArr[i]?'on':'')}"></div>`;
  return h + '</div>';
}

function gameLearn(li, ui){
  const u = LEVELS[li].units[ui];
  const words = u.words;
  const isPhrase = li >= 2;
  let idx = 0;
  const listened = new Set();
  function draw(){
    const w = words[idx];
    const stage = gameShell(li, ui, `
      ${dots(idx, words.length, words.map((_,i)=>i<idx))}
      <div class="word-emoji ${emojiLen(w.e)>2?'long':''}">${w.e}</div>
      <div class="word-en ${isPhrase?'phrase':''}" style="color:${u.color}">${isPhrase?w.en:w.en.toUpperCase()}</div>
      <div class="word-es">${w.es}</div>
      <div class="controls">
        <button class="btn mint big" id="hearBtn">🔊 Escuchar</button>
        <button class="btn coral big" id="nextBtn">${idx===words.length-1?'¡Terminar! 🏁':'Siguiente ➡'}</button>
      </div>
      <p class="hint">Toca 🔊, escucha y repite en voz alta</p>`);
    const hear = ()=>{ speak(w.en); listened.add(idx); };
    stage.querySelector('#hearBtn').onclick = hear;
    setTimeout(hear, 350);
    stage.querySelector('#nextBtn').onclick = ()=>{
      if(idx < words.length-1){ idx++; draw(); }
      else{
        const stars = listened.size >= words.length ? 5 : (listened.size >= words.length*0.7 ? 4 : 3);
        showReward(stars, `Has aprendido ${words.length} ${isPhrase?'frases nuevas':'palabras nuevas'}`,
          ()=>renderUnit(li,ui), ()=>setStars(li,ui,'learn',stars));
      }
    };
  }
  draw();
}

/* ============================================================
   JUEGO · ESCUCHA Y ELIGE
   ============================================================ */
function gameListen(li, ui){
  const u = LEVELS[li].units[ui];
  runListenRounds(li, ui, shuffle(u.words).slice(0, Math.min(10, u.words.length)), u.words, (stars, correct, total)=>{
    showReward(stars, `Has acertado ${correct} de ${total} a la primera`,
      ()=>renderUnit(li,ui), ()=>setStars(li,ui,'listen',stars));
  });
}
function runListenRounds(li, ui, rounds, pool, onDone, customTitle, customOnBack){
  let idx = 0, correct = 0, firstTry = true;
  const results = [];
  function draw(){
    const w = rounds[idx];
    const used = new Set([w.e]);
    const distract = shuffle(pool).filter(x=>{
      if(x.en === w.en || used.has(x.e)) return false;
      used.add(x.e); return true;
    }).slice(0,3);
    const options = shuffle([w, ...distract]);
    firstTry = true;
    const stage = gameShell(li, ui, `
      ${dots(idx, rounds.length, results)}
      <h2 style="margin:4px 0">👂 ¿Qué has oído?</h2>`, customTitle, customOnBack);
      <button class="btn mint big" id="replayBtn">🔊 Escuchar otra vez</button>
      <div class="opts">
        ${options.map(o=>`<button class="opt ${emojiLen(o.e)>2?'long':''}" data-en="${o.en.replace(/"/g,'')}" aria-label="${o.es}">${o.e}</button>`).join('')}
      </div>`);
    const play = ()=>speak(w.en);
    setTimeout(play, 400);
    stage.querySelector('#replayBtn').onclick = play;
    stage.querySelectorAll('.opt').forEach(b=>{
      b.onclick = ()=>{
        if(b.dataset.en === w.en.replace(/"/g,'')){
          b.classList.add('good'); sndGood();
          if(firstTry) correct++;
          results[idx] = firstTry;
          speak(w.en, 0.9);
          setTimeout(()=>{
            idx++;
            if(idx < rounds.length) draw();
            else onDone(starsFromScore(correct, rounds.length), correct, rounds.length);
          }, 900);
        }else{
          b.classList.add('bad'); sndBad(); firstTry = false;
          setTimeout(()=>b.classList.remove('bad'), 500);
        }
      };
    });
  }
  draw();
}

/* ============================================================
   JUEGO · MEMORIA
   ============================================================ */
function gameMemory(li, ui){
  const u = LEVELS[li].units[ui];
  const pairs = shuffle(u.words).slice(0,6);
  const cards = shuffle([
    ...pairs.map(w=>({key:w.en, type:'e', label:w.e})),
    ...pairs.map(w=>({key:w.en, type:'t', label:w.en.toUpperCase()}))
  ]);
  let flipped = [], attempts = 0, found = 0, lock = false;
  const stage = gameShell(li, ui, `
    <h2 style="margin:4px 0">🧠 Une las parejas</h2>
    <p class="hint" style="margin:0">Intentos: <b id="attCnt">0</b></p>
    <div class="mgrid">
      ${cards.map((c,i)=>`<button class="mcard" data-i="${i}">❓</button>`).join('')}
    </div>`);
  stage.querySelectorAll('.mcard').forEach(btn=>{
    btn.onclick = ()=>{
      if(lock) return;
      const c = cards[+btn.dataset.i];
      if(btn.classList.contains('flip') || btn.classList.contains('done')) return;
      sndFlip();
      btn.classList.add('flip');
      btn.innerHTML = c.type==='e' ? c.label : `<span class="wtxt">${c.label}</span>`;
      flipped.push({btn, c});
      if(flipped.length === 2){
        lock = true; attempts++;
        stage.querySelector('#attCnt').textContent = attempts;
        const [a,b] = flipped;
        if(a.c.key === b.c.key && a.c.type !== b.c.type){
          sndGood(); speak(a.c.key);
          a.btn.classList.add('done'); b.btn.classList.add('done');
          const rA = a.btn.getBoundingClientRect(); const rB = b.btn.getBoundingClientRect();
          miniConfetti(rA.left + rA.width/2, rA.top + rA.height/2);
          miniConfetti(rB.left + rB.width/2, rB.top + rB.height/2);
          found++; flipped = []; lock = false;
          if(found === pairs.length){
            const stars = attempts<=8?5 : attempts<=10?4 : attempts<=13?3 : attempts<=16?2 : 1;
            setTimeout(()=>showReward(stars, `Parejas encontradas en ${attempts} intentos`,
              ()=>renderUnit(li,ui), ()=>setStars(li,ui,'memory',stars)), 600);
          }
        }else{
          sndBad();
          setTimeout(()=>{
            [a,b].forEach(x=>{ x.btn.classList.remove('flip'); x.btn.textContent = '❓'; });
            flipped = []; lock = false;
          }, 850);
        }
      }
    };
  });
}

/* ============================================================
   JUEGO · DELETREA (nivel 2)
   ============================================================ */
function gameSpell(li, ui){
  const u = LEVELS[li].units[ui];
  const words = shuffle(u.words.filter(w=>!w.en.includes(' '))).slice(0,6);
  let idx = 0, wins = 0, firstTry = true;
  const results = [];
  function draw(){
    firstTry = true;
    const w = words[idx];
    const letters = w.en.toUpperCase().split('');
    const tiles = shuffle(letters.map((ch,i)=>({ch,i})));
    let filled = [];
    const stage = gameShell(li, ui, `
      ${dots(idx, words.length, results)}
      <div class="word-emoji">${w.e}</div>
      <div class="word-es" style="font-size:1.2rem"><b>${w.es}</b></div>
      <div class="controls" style="margin-top:4px">
        <button class="btn ghost" id="hearBtn">🔊 Escuchar</button>
        <button class="btn ghost" id="peekBtn">👁️ Pista</button>
      </div>
      <div class="slots" id="slots">${letters.map(()=>'<div class="slot"></div>').join('')}</div>
      <div class="tiles" id="tiles">
        ${tiles.map((t,k)=>`<button class="tile" data-k="${k}">${t.ch}</button>`).join('')}
      </div>
      <div class="controls">
        <button class="btn coral" id="delBtn">⬅ Borrar</button>
      </div>
      <div class="feedback" id="fb"></div>`);
    const slots = stage.querySelectorAll('.slot');
    const fb = stage.querySelector('#fb');
    const play = ()=>speak(w.en);
    setTimeout(play, 350);
    stage.querySelector('#hearBtn').onclick = play;
    stage.querySelector('#peekBtn').onclick = ()=>{
      firstTry = false;
      fb.className = 'feedback'; fb.textContent = w.en.toUpperCase();
      setTimeout(()=>{ if(fb.textContent === w.en.toUpperCase()) fb.textContent = ''; }, 1500);
    };
    function refresh(){
      slots.forEach((s,i)=>{
        s.textContent = filled[i] ? filled[i].ch : '';
        s.classList.toggle('filled', !!filled[i]);
      });
    }
    function check(){
      const word = filled.map(f=>f.ch).join('');
      if(word === w.en.toUpperCase()){
        sndGood(); speak(w.en);
        fb.className = 'feedback ok'; fb.textContent = '¡Perfecto! 🌟';
        if(firstTry) wins++;
        results[idx] = firstTry;
        setTimeout(()=>{
          idx++;
          if(idx < words.length) draw();
          else{
            const stars = starsFromScore(wins, words.length);
            showReward(stars, `Has escrito bien ${wins} de ${words.length} palabras a la primera`,
              ()=>renderUnit(li,ui), ()=>setStars(li,ui,'spell',stars));
          }
        }, 1000);
      }else{
        sndBad(); firstTry = false;
        fb.className = 'feedback no'; fb.textContent = 'Uy, casi… ¡otra vez! 🔁';
        setTimeout(()=>{
          filled.forEach(f=>{ stage.querySelector(`.tile[data-k="${f.k}"]`).disabled = false; });
          filled = []; refresh(); fb.textContent = '';
        }, 900);
      }
    }
    stage.querySelectorAll('.tile').forEach(btn=>{
      btn.onclick = ()=>{
        if(filled.length >= letters.length) return;
        sndFlip();
        btn.disabled = true;
        filled.push({ch:btn.textContent, k:btn.dataset.k});
        refresh();
        if(filled.length === letters.length) setTimeout(check, 250);
      };
    });
    stage.querySelector('#delBtn').onclick = ()=>{
      const last = filled.pop();
      if(last){ stage.querySelector(`.tile[data-k="${last.k}"]`).disabled = false; refresh(); }
    };
  }
  draw();
}

/* ============================================================
   JUEGO · CONSTRUYE LA FRASE (nivel 3)
   ============================================================ */
function gameBuild(li, ui){
  const u = LEVELS[li].units[ui];
  const phrases = shuffle(u.words).slice(0,6);
  let idx = 0, wins = 0, firstTry = true;
  const results = [];
  function draw(){
    firstTry = true;
    const w = phrases[idx];
    const tokens = w.en.split(' ');
    const tiles = shuffle(tokens.map((t,i)=>({t,i})));
    let answer = [];
    const stage = gameShell(li, ui, `
      ${dots(idx, phrases.length, results)}
      <div class="word-emoji ${emojiLen(w.e)>2?'long':''}">${w.e}</div>
      <div class="word-es" style="font-size:1.15rem"><b>${w.es}</b></div>
      <button class="btn ghost" id="hearBtn">🔊 Escuchar la frase</button>
      <div class="answer-row" id="ans"></div>
      <div class="tiles" id="tiles">
        ${tiles.map((t,k)=>`<button class="tile word" data-k="${k}">${t.t}</button>`).join('')}
      </div>
      <div class="feedback" id="fb"></div>`);
    const ans = stage.querySelector('#ans');
    const fb = stage.querySelector('#fb');
    const play = ()=>speak(w.en);
    setTimeout(play, 350);
    stage.querySelector('#hearBtn').onclick = play;
    function refresh(){
      ans.innerHTML = answer.map((a,j)=>`<button class="tile word" data-j="${j}">${a.t}</button>`).join('');
      ans.querySelectorAll('.tile').forEach(b=>{
        b.onclick = ()=>{
          const item = answer.splice(+b.dataset.j,1)[0];
          stage.querySelector(`#tiles .tile[data-k="${item.k}"]`).disabled = false;
          refresh();
        };
      });
    }
    function check(){
      const built = answer.map(a=>a.t).join(' ');
      if(built === w.en){
        sndGood(); speak(w.en);
        ans.classList.add('good');
        fb.className = 'feedback ok'; fb.textContent = '¡Frase perfecta! 🌟';
        if(firstTry) wins++;
        results[idx] = firstTry;
        setTimeout(()=>{
          idx++;
          if(idx < phrases.length) draw();
          else{
            const stars = starsFromScore(wins, phrases.length);
            showReward(stars, `Has construido bien ${wins} de ${phrases.length} frases a la primera`,
              ()=>renderUnit(li,ui), ()=>setStars(li,ui,'build',stars));
          }
        }, 1100);
      }else{
        sndBad(); firstTry = false;
        ans.classList.add('bad');
        fb.className = 'feedback no'; fb.textContent = 'Escucha otra vez y ordénala 🔁';
        speak(w.en, 0.75);
        setTimeout(()=>{
          ans.classList.remove('bad');
          answer.forEach(a=>{ stage.querySelector(`#tiles .tile[data-k="${a.k}"]`).disabled = false; });
          answer = []; refresh(); fb.textContent = '';
        }, 1100);
      }
    }
    stage.querySelectorAll('#tiles .tile').forEach(btn=>{
      btn.onclick = ()=>{
        sndFlip();
        btn.disabled = true;
        answer.push({t:btn.textContent, k:btn.dataset.k});
        refresh();
        if(answer.length === tokens.length) setTimeout(check, 250);
      };
    });
  }
  draw();
}

/* ============================================================
   JUEGO · TRADUCE (leer y elegir en inglés)
   ============================================================ */
function gameTrans(li, ui){
  const u = LEVELS[li].units[ui];
  const rounds = shuffle(u.words).slice(0, Math.min(6, u.words.length));
  let idx = 0, correct = 0, firstTry = true;
  const results = [];
  function draw(){
    const w = rounds[idx];
    const options = shuffle([w, ...shuffle(u.words.filter(x=>x.en!==w.en)).slice(0,3)]);
    firstTry = true;
    const stage = gameShell(li, ui, `
      ${dots(idx, rounds.length, results)}
      <h2 style="margin:4px 0">🔁 ¿Cómo se dice en inglés?</h2>
      <div class="word-emoji ${emojiLen(w.e)>2?'long':''}">${w.e}</div>
      <div class="word-es" style="font-size:1.25rem"><b>${w.es}</b></div>
      <div class="opts" style="grid-template-columns:1fr">
        ${options.map((o,i)=>`<button class="opt long" data-i="${i}" style="font-family:'Fredoka'; font-weight:600; font-size:1.25rem; color:var(--ink)">${o.en}</button>`).join('')}
      </div>`);
    stage.querySelectorAll('.opt').forEach(b=>{
      b.onclick = ()=>{
        const o = options[+b.dataset.i];
        if(o.en === w.en){
          b.classList.add('good'); sndGood();
          if(firstTry) correct++;
          results[idx] = firstTry;
          speak(w.en, 0.9);
          setTimeout(()=>{
            idx++;
            if(idx < rounds.length) draw();
            else{
              const stars = starsFromScore(correct, rounds.length);
              showReward(stars, `Has acertado ${correct} de ${rounds.length} a la primera`,
                ()=>renderUnit(li,ui), ()=>setStars(li,ui,'trans',stars));
            }
          }, 950);
        }else{
          b.classList.add('bad'); sndBad(); firstTry = false;
          setTimeout(()=>b.classList.remove('bad'), 500);
        }
      };
    });
  }
  draw();
}

/* ============================================================
   JUEGO · ¡HABLA!
   ============================================================ */
let activeSR = null;
function stopSR(){ 
  if(activeSR){ try{activeSR.abort();}catch(e){} activeSR = null; } 
  if('speechSynthesis' in window) window.speechSynthesis.cancel();
}

function gameSpeak(li, ui){
  const u = LEVELS[li].units[ui];
  const isPhrase = li >= 2;
  const words = shuffle(u.words).slice(0,6);
  let idx = 0, wins = 0, tries = 0;
  const results = [];
  function next(){
    idx++;
    if(idx < words.length) draw();
    else{
      const stars = starsFromScore(wins, words.length);
      showReward(stars, `Has pronunciado bien ${wins} de ${words.length} ${isPhrase?'frases':'palabras'}`,
        ()=>renderUnit(li,ui), ()=>setStars(li,ui,'speak',stars));
    }
  }
  function draw(){
    tries = 0;
    const hasSR = !!SR && !state.noMic;
    const w = words[idx];
    const stage = gameShell(li, ui, `
      ${dots(idx, words.length, results)}
      <div class="word-emoji ${emojiLen(w.e)>2?'long':''}">${w.e}</div>
      <div class="word-en ${isPhrase?'phrase':''}" style="color:${u.color}">${isPhrase?w.en:w.en.toUpperCase()}</div>
      <div class="word-es">${w.es}</div>
      <button class="btn ghost" id="hearBtn">🔊 Escuchar cómo suena</button><br>
      ${hasSR
        ? `<button class="mic-btn" id="micBtn" aria-label="Hablar">🎤</button>
           <div class="feedback" id="fb">Pulsa el micro y dilo en voz alta</div>
           <div class="heard" id="heard"></div>`
        : `<div class="feedback">Dilo en voz alta.<br>Un adulto marca cómo ha salido:</div>
           <div class="controls">
             <button class="btn mint big" id="okBtn">✔️ ¡Lo dijo bien!</button>
             <button class="btn coral" id="koBtn">Otra vez</button>
           </div>`}
    `);
    stage.querySelector('#hearBtn').onclick = ()=>speak(w.en);
    setTimeout(()=>speak(w.en), 350);
    if(hasSR){
      const mic = stage.querySelector('#micBtn');
      const fb = stage.querySelector('#fb');
      const heard = stage.querySelector('#heard');
      function fail(silent){
        tries++;
        sndBad();
        fb.className = 'feedback no';
        if(tries >= 3){
          fb.textContent = 'No pasa nada, ¡a la siguiente! 💪';
          results[idx] = false;
          setTimeout(next, 1300);
        }else{
          fb.textContent = silent ? 'No te he oído, ¡inténtalo otra vez! 🎤' : 'Casi… escúchala y repite 🔁';
          speak(w.en, 0.75);
        }
      }
      mic.onclick = ()=>{
        stopSR();
        speechSynthesis.cancel();
        const rec = new SR();
        activeSR = rec;
        rec.lang = 'en-US'; rec.interimResults = false; rec.maxAlternatives = 5;
        mic.classList.add('listening');
        fb.className = 'feedback'; fb.textContent = 'Te escucho… 👂';
        heard.textContent = '';
        let got = false;
        rec.onresult = (ev)=>{
          if(activeSR !== rec) return;
          got = true;
          const alts = Array.from(ev.results[0]).map(r=>r.transcript);
          heard.textContent = 'He oído: "' + alts[0] + '"';
          if(alts.some(t=>matchesAnswer(t, w.en))){
            sndGood(); fb.className = 'feedback ok'; fb.textContent = '¡Genial! 🌟';
            wins++; results[idx] = true;
            setTimeout(next, 1100);
          }else fail();
        };
        rec.onerror = (ev)=>{
          if(activeSR !== rec) return;
          mic.classList.remove('listening');
          if(ev.error === 'not-allowed' || ev.error === 'service-not-allowed'){
            fb.className = 'feedback no';
            fb.textContent = 'El micrófono está bloqueado en este dispositivo';
            if(!stage.querySelector('#switchBtn')){
              const sw = document.createElement('button');
              sw.className = 'btn berry'; sw.id = 'switchBtn';
              sw.textContent = '🙋 Jugar sin micrófono (valida un adulto)';
              sw.onclick = ()=>{ state.noMic = true; saveState(); draw(); };
              heard.after(sw);
            }
          } else if(!got) fail(true);
        };
        rec.onend = ()=>{ 
          if(activeSR !== rec) return;
          mic.classList.remove('listening'); 
          if(!got && fb.textContent.startsWith('Te escucho')) fail(true); 
        };
        try{ rec.start(); }catch(e){}
      };
    }else{
      stage.querySelector('#okBtn').onclick = ()=>{ sndGood(); wins++; results[idx]=true; next(); };
      stage.querySelector('#koBtn').onclick = ()=>{ sndBad(); speak(w.en, 0.75); tries++; if(tries>=3){ results[idx]=false; next(); } };
    }
  }
  draw();
}

/* ============================================================
   RETO DEL DÍA
   ============================================================ */
function gameDaily(){
  if(state.daily[todayKey()]){
    speak('See you tomorrow!');
    return;
  }
  const pool = [];
  LEVELS.forEach((L,li)=>{
    if(!levelUnlocked(li)) return;
    L.units.forEach((u,ui)=>{ if(unitUnlocked(li,ui)) pool.push(...u.words); });
  });
  const rounds = shuffle(pool).slice(0, 10);
  runListenRounds(0, 0, rounds, pool, (stars, correct, total)=>{
    showReward(stars, `Reto del día: ${correct} de ${total} · ¡Racha 🔥 ${streak()+1} días!`,
      renderHome, ()=>{ state.daily[todayKey()] = stars; saveState(); });
  }, 'Reto del día', renderHome);
}

/* ============================================================
   ZONA DE PADRES
   ============================================================ */
function renderParent(){
  const ov = document.createElement('div');
  ov.className = 'overlay';
  ov.innerHTML = `
    <div class="panel">
      <h2>⚙️ Zona de padres</h2>
      <table>
        ${LEVELS.map((L,li)=>`<tr><td>${L.icon} Nivel ${li+1} · ${L.name}</td><td>⭐ ${levelStars(li)} / ${levelMax(li)}</td></tr>`).join('')}
        <tr><td>🎯 Retos diarios</td><td>⭐ ${dailyStars()}</td></tr>
        <tr><td><b>Total</b></td><td><b>⭐ ${totalStars()}</b></td></tr>
      </table>
      <p>Cada mundo está pensado para trabajarse 1-2 semanas: los 3 niveles cubren un año completo de aprendizaje progresivo (vocabulario → lectura y escritura → frases).<br>
      El juego "¡Habla!" usa el micrófono: funciona cuando la app se abre desde una dirección web (https) en Chrome. Si se abre como archivo local, usa el modo sin micrófono.</p>
      <button class="btn berry" id="micModeBtn">${state.noMic?'🎤 Activar micrófono':'🙋 Modo sin micrófono (valida un adulto)'}</button>
      <button class="btn sun" id="ttsModeBtn">🗣️ Velocidad de voz: ${state.slowTTS?'Lenta':'Normal'}</button>
      <button class="btn mint" id="unlockBtn">${state.unlockAll?'🔒 Volver a bloquear por progreso':'🔓 Desbloquear todos los niveles y mundos'}</button>
      <div style="display:flex; gap:8px; margin-top:10px;">
        <button class="btn ghost" style="flex:1" id="exportBtn">💾 Exportar</button>
        <button class="btn ghost" style="flex:1" id="importBtn">📂 Importar</button>
      </div>
      <button class="btn coral" id="resetBtn" style="margin-top:10px">🗑️ Reiniciar todo el progreso</button>
      <button class="btn ghost" id="closeBtn">Cerrar</button>
    </div>`;
  document.body.appendChild(ov);
  ov.querySelector('#micModeBtn').onclick = ()=>{ state.noMic = !state.noMic; saveState(); ov.remove(); renderHome(); };
  ov.querySelector('#ttsModeBtn').onclick = ()=>{ state.slowTTS = !state.slowTTS; saveState(); ov.remove(); renderParent(); };
  ov.querySelector('#unlockBtn').onclick = ()=>{ state.unlockAll = !state.unlockAll; saveState(); ov.remove(); renderHome(); };
  ov.querySelector('#exportBtn').onclick = ()=>{
    const code = btoa(encodeURIComponent(JSON.stringify(state)));
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(code).then(()=>alert('¡Código copiado al portapapeles! Guárdalo bien.'), ()=>alert('Copia este código:\n\n' + code));
    }else{ prompt('Copia este código y guárdalo bien:', code); }
  };
  ov.querySelector('#importBtn').onclick = ()=>{
    const code = prompt('Pega aquí el código de progreso:');
    if(code){
      try{
        const parsed = JSON.parse(decodeURIComponent(atob(code)));
        if(parsed && parsed.stars){
          state = Object.assign(state, parsed);
          saveState(); ov.remove(); renderHome();
        }else throw new Error();
      }catch(e){ alert('Código inválido. Asegúrate de pegarlo completo.'); }
    }
  };
  ov.querySelector('#resetBtn').onclick = ()=>{
    if(confirm('¿Seguro que quieres borrar todas las estrellas y pegatinas?')){
      state = {stars:{}, unlockAll:false, noMic:state.noMic, daily:{}, slowTTS:state.slowTTS}; saveState(); ov.remove(); renderHome();
    }
  };
  ov.querySelector('#closeBtn').onclick = ()=>ov.remove();
  ov.onclick = (e)=>{ if(e.target === ov) ov.remove(); };
}
